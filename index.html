                oy: ty + Math.sin(angle) * dist,
            });
        }

        // Advance in-flight meteors
        for (let i = this.incomingMeteors.length - 1; i >= 0; i--) {
            const m = this.incomingMeteors[i];
            m.timer -= dt;
            if (m.timer <= 0) {
                this.incomingMeteors.splice(i, 1);
                if (this.grid[m.c][m.r] === T_EMPTY || this.grid[m.c][m.r] === T_ROAD) {
                    this.grid[m.c][m.r] = T_CRATER;
                }
                this.meteorFlashes.push({ c: m.c, r: m.r, life: 1.0 });
                this.dustClouds.push({
                    wx: m.c * TILE + TILE/2,
                    wy: OY + m.r * TILE + TILE/2,
                    life: 1.0, maxLife: 18 + Math.random() * 8
                });
                const hC = Math.floor(this.habX / TILE);
                const hR = Math.floor((this.habY - OY) / TILE);
                const dc = Math.abs(hC - m.c);
                const dr = Math.abs(hR - m.r);
                const sx = this.habX - this.cameras.main.scrollX;
                if (dc === 0 && dr === 0) {
                    this.hull = Math.max(0, this.hull - 25);
                    this.popup(sx, this.habY - 52, '☄ BEZPOŚREDNIE TRAFIENIE! -25%', '#ff2200');
                } else if (dc <= 1 && dr <= 1) {
                    this.hull = Math.max(0, this.hull - 10);
                    this.popup(sx, this.habY - 52, '☄ ODŁAMKI! -10% KADŁUB', '#ff6600');
                } else {
                    const impactSx = m.c * TILE + TILE/2 - this.cameras.main.scrollX;
                    this.popup(impactSx, OY + m.r * TILE + TILE/2, '☄ MIKROMETEORIT', '#ff8844');
                }
            }
        }

        // Decay impact flashes
        for (let i = this.meteorFlashes.length - 1; i >= 0; i--) {
            this.meteorFlashes[i].life -= dt * 2.5;
            if (this.meteorFlashes[i].life <= 0) this.meteorFlashes.splice(i, 1);
        }
        for (let i = this.dustClouds.length - 1; i >= 0; i--) {
            this.dustClouds[i].life -= dt / this.dustClouds[i].maxLife;
            if (this.dustClouds[i].life <= 0) this.dustClouds.splice(i, 1);
        }

        // Oxygen drain / regen
        if (this.power < 10) {
            // Low power → life support collapsing
            const drainRate = 8 * (1 - this.power / 10);
            this.oxygen = Phaser.Math.Clamp(this.oxygen - drainRate * dt, 0, 100);
        } else if (this.o2Failure) {
            this.oxygen = Phaser.Math.Clamp(this.oxygen - 3 * dt, 0, 100);
        } else if (this.oxygen < 100) {
            this.oxygen = Phaser.Math.Clamp(this.oxygen + 2 * dt, 0, 100);
        }
        // Turbo burns oxygen (rocket combustion)
        if (this.turboActive) {
            this.oxygen = Phaser.Math.Clamp(this.oxygen - 12 * dt, 0, 100);
        }

        if (this.oxygen <= 0 || this.hull <= 0) {
            // Save entire grid for replay (flat array, column-major)
            try {
                const flat = [];
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        flat.push(this.grid[c][r]);
                localStorage.setItem('lunarRoad', JSON.stringify(flat));
                localStorage.setItem('lunarStructures', JSON.stringify(this.structures || []));
                localStorage.setItem('lunarWreck', JSON.stringify({
                    x: Math.round(this.habX),
                    y: Math.round(this.habY),
                    angle: this.habAngle,
                    cause: this.hull <= 0 ? 'hull' : 'oxygen'
                }));
            } catch(e) {}
            this.scene.start('GameOver', {
                distance:   Math.floor((this.habX - this.startX) / 5.2),
                roadBuilt:  this.roadBuilt,
                nightSpeed: Math.floor(this.nightSpeed),
                cause: this.hull <= 0 ? 'hull' : 'oxygen'
            });
        }
    }

    // ── Habitat movement — angle-based, fully manual ─────────
    moveHabitat(dt) {
        const c = Math.floor(this.habX / TILE);
        const r = Math.floor((this.habY - OY) / TILE);
        const curType = (c >= 0 && c < COLS && r >= 0 && r < ROWS) ? this.grid[c][r] : T_EMPTY;

        const hullMod  = 0.4 + 0.6 * (this.hull / 100);
        const driveMod = this.driveFailure ? 0.35 : 1;
        const topSpeed = (curType === T_ROAD ? 92 : 28) * (this.turboActive ? 1.9 : 1) * hullMod * driveMod;
        const inNight  = (this.lastDarkness || 0) > 0.5;

        // ── Rotate (A = turn up/left, D = turn down/right) ───
        const turnRate = 2.4; // rad/s
        if (this.aKey.isDown) this.habAngle -= turnRate * dt;
        if (this.dKey.isDown) this.habAngle += turnRate * dt;

        // ── Accelerate / brake (W / S) ────────────────────────
        if (this.wKey.isDown) {
            this.habVX = Math.min(this.habVX + 280 * dt, topSpeed);
        } else if (this.sKey.isDown) {
            this.habVX = Math.max(this.habVX - 350 * dt, -(topSpeed * 0.3));
        } else {
            const drag = 160;
            if (this.habVX > 0) this.habVX = Math.max(0, this.habVX - drag * dt);
            else if (this.habVX < 0) this.habVX = Math.min(0, this.habVX + drag * dt);
        }
        // Gradual deceleration when speed exceeds current topSpeed (e.g. drive failure kicks in)
        if (this.habVX > topSpeed) this.habVX = Math.max(topSpeed, this.habVX - 180 * dt);
        else if (this.habVX < -(topSpeed * 0.3)) this.habVX = Math.min(-(topSpeed * 0.3), this.habVX + 180 * dt);

        // ── Winch (grappling hook) ────────────────────────────
        const lJustDown = Phaser.Input.Keyboard.JustDown(this.lKey);
        const lHeld     = this.lKey.isDown;

        if (lJustDown && !this.winchActive) {
            // Find nearest crater or boulder in front of the habitat (forward hemisphere)
            const hC  = Math.floor(this.habX / TILE);
            const hR  = Math.floor((this.habY - OY) / TILE);
            const fwdX = Math.cos(this.habAngle);
            const fwdY = Math.sin(this.habAngle);
            let bestDist = Infinity, bestX = null, bestY = null;
            const WRANGE = 10;
            for (let dc = -WRANGE; dc <= WRANGE; dc++) {
                for (let dr = -WRANGE; dr <= WRANGE; dr++) {
                    const tc = hC + dc, tr = hR + dr;
                    if (tc < 0 || tc >= COLS || tr < 0 || tr >= ROWS) continue;
                    if (dc === 0 && dr === 0) continue;
                    const tt = this.grid[tc][tr];
                    if (tt === T_CRATER || tt === T_BOULDER) {
                        const wx = tc * TILE + TILE / 2;
                        const wy = OY + tr * TILE + TILE / 2;
                        const dx = wx - this.habX, dy = wy - this.habY;
                        // Skip tiles behind the habitat (dot product with forward dir must be > 0)
                        if (fwdX * dx + fwdY * dy <= 0) continue;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < bestDist) { bestDist = d; bestX = wx; bestY = wy; }
                    }
                }
            }
            const sx2 = this.habX - this.cameras.main.scrollX;
            if (bestX !== null) {
                this.winchActive = true;
                this.winchAnchor = { x: bestX, y: bestY };
                this.popup(sx2, this.habY - 52, '🪝 WYCIĄGARKA', '#aaddff');
            } else {
                this.popup(sx2, this.habY - 52, '⚠ BRAK ZACZEPU', '#ff8833');
            }
        }
        if (!lHeld && this.winchActive) {
            this.winchActive = false;
            this.winchAnchor = null;
        }
        if (lHeld && this.winchActive && this.winchAnchor) {
            const wdx = this.winchAnchor.x - this.habX;
            const wdy = this.winchAnchor.y - this.habY;
            const wdist = Math.sqrt(wdx * wdx + wdy * wdy);
            if (wdist > 10) {
                const pullSpeed = 38; // px/s — slow deliberate pull
                this.habX += (wdx / wdist) * pullSpeed * dt;
                this.habY += (wdy / wdist) * pullSpeed * dt;
                this.habX = Phaser.Math.Clamp(this.habX, TILE / 2, COLS * TILE - TILE / 2);
                this.habY = Phaser.Math.Clamp(this.habY, OY + TILE / 2, OY + ROWS * TILE - TILE / 2);
                this.habVX = 0;
                // Winch motor drains power heavily
                this.power = Phaser.Math.Clamp(this.power - 22 * dt, 0, 100);
                if (this.power <= 0) {
                    this.winchActive = false;
                    this.winchAnchor = null;
                    const sx2 = this.habX - this.cameras.main.scrollX;
                    this.popup(sx2, this.habY - 52, '⚡ WYCIĄGARKA — BRAK PRĄDU', '#ff4400');
                }
            } else {
                this.winchActive = false;
                this.winchAnchor = null;
            }
        }

        // ── Move along heading ────────────────────────────────
        if (this.winchActive) { /* position already updated above — skip normal move */ }
        const spd = (inNight ? 0.35 : 1) * (this.winchActive ? 0 : this.habVX);
        const nx  = this.habX + Math.cos(this.habAngle) * spd * dt;
        const ny  = this.habY + Math.sin(this.habAngle) * spd * dt;

        const nc = Math.floor(nx / TILE);
        const nr = Math.floor((ny - OY) / TILE);

        if (this.isPassable(nc, nr)) {
            this.habX = nx;
            this.habY = ny;
        } else {
            // Wreck impact damage
            const hitWreck = this.isWreckTile(nc, nr) ||
                             this.isWreckTile(nc, r)  ||
                             this.isWreckTile(c,  nr);
            // Boulder impact damage
            const hitBoulder = this.isBoulder(nc, nr) ||
                               this.isBoulder(nc, r)  ||
                               this.isBoulder(c,  nr);
            if (hitWreck && Math.abs(spd) > 8) {
                const dmg = Math.round(Math.abs(spd) / 9);
                this.hull = Math.max(0, this.hull - dmg);
                this.habVX *= 0.15;
                const sx = this.habX - this.cameras.main.scrollX;
                this.popup(sx, this.habY - 35, `⚠ WRAK! -${dmg}% KADŁUB`, '#ffaa22');
            } else if (hitBoulder && Math.abs(spd) > 12) {
                const dmg = Math.round(Math.abs(spd) / 7);
                this.hull = Math.max(0, this.hull - dmg);
                this.habVX *= 0.12; // jarring stop
                const sx = this.habX - this.cameras.main.scrollX;
                this.popup(sx, this.habY - 35, `-${dmg}% KADŁUB`, '#ff6622');
            } else if (this.isPassable(c, nr)) {
                this.habY = ny;
                this.habVX *= 0.4;
            } else if (this.isPassable(nc, r)) {
                this.habX = nx;
                this.habVX *= 0.4;
            } else {
                this.habVX = 0;
            }
        }

        // Off-road hull wear — rough regolith slowly damages the chassis
        if (curType === T_EMPTY && Math.abs(this.habVX) > 5) {
            const wear = 1.8 * (Math.abs(this.habVX) / 92) * dt;
            this.hull = Math.max(0, this.hull - wear);
        }

        this.habX = Phaser.Math.Clamp(this.habX, TILE / 2, COLS * TILE - TILE / 2);
        this.habY = Phaser.Math.Clamp(this.habY, OY + TILE / 2, OY + (ROWS - 0.5) * TILE);
    }

    // ── Wheel trail ───────────────────────────────────────────
    updateTrail(dt) {
        this.trailTimer += dt;
        const trailInterval = this.turboActive ? 0.02 : 0.05;
        if (this.trailTimer > trailInterval && this.power > 0) {
            this.trailTimer = 0;
            const spread = this.turboActive ? 10 : 7;
            const cos = Math.cos(this.habAngle), sin = Math.sin(this.habAngle);
            const bx = this.habX - cos * 22;   // rear centre (world)
            const by = this.habY - sin * 22;
            const px = -sin * spread;           // perpendicular offset
            const py =  cos * spread;
            this.trail.push({ x: bx + px, y: by + py, life: 1, turbo: this.turboActive });
            this.trail.push({ x: bx - px, y: by - py, life: 1, turbo: this.turboActive });
            if (this.turboActive) {
                this.trail.push({ x: bx, y: by, life: 1.4, turbo: true });
            }
            if (this.trail.length > 90) this.trail.splice(0, 3);
        }
        const g = this.trailGfx; g.clear();
        for (const t of this.trail) {
            t.life -= dt * (t.turbo ? 2.2 : 1.6);
            if (t.life > 0) {
                if (t.turbo) {
                    g.fillStyle(0xff7700, t.life * 0.35);
                    g.fillRect(t.x, t.y, 4, 4);
                } else {
                    g.fillStyle(0x888888, t.life * 0.22);
                    g.fillRect(t.x, t.y, 3, 3);
                }
            }
        }
        this.trail = this.trail.filter(t => t.life > 0);
    }

    // ── Hover preview ─────────────────────────────────────────
    updatePreview() {
        const g = this.previewGfx; g.clear();

        // ── Winch rope ────────────────────────────────────────
        if (this.winchActive && this.winchAnchor) {
            const camL   = this.cameras.main.scrollX;
            // Rope origin = front of habitat (nose tip, +22px along heading)
            const cosA   = Math.cos(this.habAngle);
            const sinA   = Math.sin(this.habAngle);
            const hsx    = this.habX + cosA * 22 - camL;
            const hsy    = this.habY + sinA * 22;
            const asx    = this.winchAnchor.x - camL;
            const asy    = this.winchAnchor.y;
            // rope
            g.lineStyle(2, 0xaaddff, 0.85);
            g.beginPath(); g.moveTo(hsx, hsy); g.lineTo(asx, asy); g.strokePath();
            // anchor point indicator
            g.lineStyle(2, 0x44aaff, 0.9);
            g.strokeCircle(asx, asy, 10);
            g.lineStyle(1, 0x88ccff, 0.7);
            g.lineBetween(asx - 8, asy, asx + 8, asy);
            g.lineBetween(asx, asy - 8, asx, asy + 8);
            // tension arc — small bow in the rope to show it's taut
            const mx = (hsx + asx) / 2;
            const my = (hsy + asy) / 2;
            g.fillStyle(0xaaddff, 0.5); g.fillCircle(mx, my, 3);
        }

        if (!this.previewTile) return;
        const { c, r, demolish } = this.previewTile;
        const sx = c * TILE - this.cameras.main.scrollX;
        const sy = OY + r * TILE;
        if (demolish) {
            const isWreck = this.previewTile.wreck;
            const cnt = isWreck ? (this.demolishCounts['wreck'] || 0) : (this.demolishCounts[`${c}_${r}`] || 0);
            g.fillStyle(isWreck ? 0xffaa00 : 0xff6600, 0.20); g.fillRect(sx, sy, TILE, TILE);
            g.lineStyle(2, isWreck ? 0xffcc44 : 0xff8833, 0.90); g.strokeRect(sx, sy, TILE, TILE);
            // remaining hits label
            const left = 15 - cnt;
            g.fillStyle(0xff4400, 0.30); g.fillRect(sx + TILE/2 - 8, sy + TILE/2 - 7, 16, 14);
        } else if (this.previewTile.buildMode) {
            if (this.previewTile.canPlace) {
                const pcx = sx + TILE/2, pcy = sy + TILE/2;
                const bid = this.buildMode ? this.buildMode.id : '';
                if (bid === 'charging_station') {
                    g.fillStyle(0x444455, 0.55); g.fillRect(sx+2, sy+2, TILE-4, TILE-4);
                    g.fillStyle(0x667788, 0.45); g.fillRect(sx+5, sy+5, TILE-10, TILE-10);
                    g.fillStyle(0x998833, 0.6);
                    g.fillRect(sx+5, sy+5, TILE-10, 3); g.fillRect(sx+5, sy+TILE-8, TILE-10, 3);
                    g.fillRect(sx+5, sy+5, 3, TILE-10); g.fillRect(sx+TILE-8, sy+5, 3, TILE-10);
                    g.fillStyle(0xaabb99, 0.75);
                    g.fillTriangle(pcx+4, pcy-11, pcx-5, pcy+1, pcx+2, pcy+1);
                    g.fillTriangle(pcx-4, pcy+11, pcx+5, pcy-1, pcx-2, pcy-1);
                } else if (bid === 'oxygen_station') {
                    g.fillStyle(0x0a1520, 0.55); g.fillRect(sx+2, sy+2, TILE-4, TILE-4);
                    g.fillStyle(0x1a2a44, 0.45); g.fillRect(sx+5, sy+5, TILE-10, TILE-10);
                    g.lineStyle(3, 0x1a3355, 0.65); g.strokeCircle(pcx, pcy, 14);
                    g.fillStyle(0x1a2d4a, 0.8); g.fillCircle(pcx, pcy, 11);
                    g.fillStyle(0x336688, 0.7); g.fillCircle(pcx, pcy, 6);
                } else if (bid === 'fuel_station') {
                    g.fillStyle(0x1a0800, 0.55); g.fillRect(sx+2, sy+2, TILE-4, TILE-4);
                    g.fillStyle(0x2a1100, 0.45); g.fillRect(sx+5, sy+5, TILE-10, TILE-10);
                    g.fillStyle(0x553300, 0.7); g.fillRect(pcx-6, pcy-10, 12, 20);
                    g.fillStyle(0x884400, 0.6); g.fillRect(pcx-4, pcy-8, 8, 16);
                    g.fillStyle(0x886622, 0.5);
                    g.fillRect(pcx-4, pcy-2, 8, 2); g.fillRect(pcx-4, pcy+3, 8, 2);
                }
                g.lineStyle(2, 0x44ffcc, 0.9); g.strokeRect(sx, sy, TILE, TILE);
            } else {
                g.fillStyle(0xff2200, 0.22); g.fillRect(sx, sy, TILE, TILE);
                g.lineStyle(2, 0xff4400, 0.9); g.strokeRect(sx, sy, TILE, TILE);
            }
        } else {
            g.fillStyle(0x88ff44, 0.22); g.fillRect(sx, sy, TILE, TILE);
            g.lineStyle(2, 0x88ff44, 0.88); g.strokeRect(sx, sy, TILE, TILE);
            g.fillStyle(0xffffff, 0.38); g.fillRect(sx+TILE/2-5, sy+TILE/2-2, 10, 4);
        }
    }

    // ── Night overlay ─────────────────────────────────────────
    updateNightOverlay() {
        const g = this.nightGfx; g.clear();

        // darkness = how close the night is to the habitat (0=far/day, 1=engulfed)
        // cyclic day/night darkness (same formula as update())
        const _NB2 = 3120, _CYCLE2 = 6240, _GRAD2 = 800;
        let darkness = 0;
        for (let _k = 0; _k <= 4; _k++) {
            const _nR = this.nightWorldX - _k * _CYCLE2;
            const _nL = _nR - _NB2;
            let _d = 0;
            if (this.habX >= _nR) {
                const _g = this.habX - _nR;
                if (_g < _GRAD2) { const _t = 1 - _g / _GRAD2; _d = _t*_t*_t*(_t*(6*_t-15)+10); }
            } else if (this.habX >= _nL) {
                const _g = this.habX - _nL;
                if (_g < _GRAD2) { const _t = _g / _GRAD2; _d = _t*_t*_t*(_t*(6*_t-15)+10); }
                else _d = 1;
            }
            darkness = Math.max(darkness, _d);
            if (_nR < this.habX - _NB2 - _GRAD2) break;
        }
        const di = this.dustIntensity || 0;

        if (darkness < 0.01 && di < 0.01) return;

        // Uniform dark overlay — whole screen
        g.fillStyle(0x000008, darkness * 0.93);
        g.fillRect(0, 0, W, H);

        // Indigo tint at mid-dusk
        if (darkness > 0.15) {
            g.fillStyle(0x080022, darkness * 0.28);
            g.fillRect(0, 0, W, H);
        }

        // Deep blue at heavy darkness
        if (darkness > 0.55) {
            g.fillStyle(0x000418, (darkness - 0.55) * 0.5);
            g.fillRect(0, 0, W, H);
        }

        // Dust cloud: grey veil + swirling patches when habitat is inside
        if (di > 0) {
            // Full-screen grey desaturation layer
            g.fillStyle(0xaa9977, di * 0.62);
            g.fillRect(0, 0, W, H);

            // Second pass: brownish grey for density feel
            g.fillStyle(0x887766, di * 0.30);
            g.fillRect(0, 0, W, H);

            // Swirling dust clumps around habitat (screen-space)
            const hsx = this.habX - this.cameras.main.scrollX;
            const hsy = this.habY;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 + this.gameTime * 0.5;
                const r = 40 + i * 22;
                const px = hsx + Math.cos(angle) * r;
                const py = hsy + Math.sin(angle) * r * 0.55;
                g.fillStyle(0xccbb99, di * (0.22 - i * 0.018));
                g.fillCircle(px, py, 28 + i * 7);
            }

            // Dense core right on the habitat
            g.fillStyle(0xddccaa, di * 0.28);
            g.fillCircle(hsx, hsy, 65);
        }
    }

        this.distTxt.setText(`📏 ${Math.floor((this.habX-this.startX)/5.2)} m`);
        const _rawGap = this.habX - this.nightWorldX;
        const _CYCLE = 6240, _NB = 3120;
        const _pos = ((-_rawGap) % _CYCLE + _CYCLE) % _CYCLE; // 0=przy nocy, _NB=przy świcie, _CYCLE=przy kolejnej nocy
        if (_pos < _NB) {
            this.nightTxt.setText(`🌅 świt ${Math.floor((_NB - _pos) / 5.2)}m za tobą`);
        } else {
            this.nightTxt.setText(`🌑 noc ${Math.floor((_CYCLE - _pos) / 5.2)}m za tobą`);
        }

        if (this.driveFailure) {
            const tick = Math.floor(this.gameTime * 6) % 2 === 0;
            this.warnTxt.setText(tick ? '⚙ AWARIA NAPĘDU — PRĘDKOŚĆ -78%!' : `NAPRAWA ZA ${Math.ceil(this.driveFailTimer)}s`);
        } else if (this.o2Failure && this.oxygen < 60) {
            const tick = Math.floor(this.gameTime * 5) % 2 === 0;
            this.warnTxt.setText(tick ? '⚠ AWARIA O₂ — TLEN SPADA!' : `NAPRAWA ZA ${Math.ceil(this.o2FailTimer)}s`);
        } else if (this.power < 10 && this.oxygen < 80) {
            const tick = Math.floor(this.gameTime * 5) % 2 === 0;
            this.warnTxt.setText(tick ? '💨 TLEN UCIEKA — PRZYWRÓĆ ZASILANIE!' : '⚡ WYJDŹ Z CIENIA!');
        } else if (inDark) {
            const dawnDist = this.habX - (this.nightWorldX - 3120); // decreases → 0 as dawn approaches
            const nearDawn = dawnDist > 0 && dawnDist < 800;
            if (nearDawn) {
                this.warnTxt.setText(Math.floor(this.gameTime*4)%2===0 ? '🌅 ŚWIT NADCHODZI — JESZCZE CHWILA!' : '');
            } else {
                this.warnTxt.setText(Math.floor(this.gameTime*4)%2===0 ? '⚡ PANELE W CIEMNOŚCI — TRACISZ MOC!' : '');
            }
        } else if (gap < 380) {
            this.warnTxt.setText(`${gap < 150 ? '⛔' : '⚠️'} NOC ${Math.floor(gap)}m — BUDUJ DROGĘ!`);
        } else {
            this.warnTxt.setText('');
        }
    }
}
