<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Lunar Pioneers — Escape the Night</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const W = 1024, H = 600;
const TILE = 48;
const COLS = 900;
const ROWS = 11;
const OY = Math.floor((H - ROWS * TILE) / 2); // vertical offset to center grid

const T_EMPTY  = 0;
const T_ROAD   = 1;
const T_CRATER = 2;
const T_BOULDER = 3;

// ════════════════════════════════════════════════════════════
//  MENU
// ════════════════════════════════════════════════════════════
class MenuScene extends Phaser.Scene {
    constructor() { super('Menu'); }
    create() {
        const g = this.add.graphics();
        g.fillStyle(0x000010, 1); g.fillRect(0, 0, W, H);

        // fake top-down surface preview
        for (let c = 0; c < Math.ceil(W / TILE) + 1; c++) {
            for (let r = 0; r < ROWS; r++) {
                const v = 0x36 + ((c * 7 + r * 11) % 12);
                g.fillStyle((v << 16) | (v << 8) | (v + 8), 1);
                g.fillRect(c * TILE, OY + r * TILE, TILE - 1, TILE - 1);
            }
        }
        [[1,2],[4,7],[8,3],[14,8],[17,4],[11,1],[6,9]].forEach(([c,r]) => {
            g.fillStyle(0x1a1a28, 1);
            g.fillEllipse(c*TILE+TILE/2, OY+r*TILE+TILE/2, TILE*0.82, TILE*0.82);
        });
        // fake road strip
        for (let c = 0; c < 22; c++) {
            g.fillStyle(0x686878, 1);
            g.fillRect(c*TILE, OY+5*TILE, TILE-1, TILE-1);
            g.fillRect(c*TILE, OY+4*TILE, TILE-1, TILE-1);
        }
        g.fillStyle(0x000010, 0.68); g.fillRect(0, 0, W, H);

        this.add.text(W/2, 110, 'LUNAR PIONEERS', {
            fontSize: '54px', fontFamily: 'monospace',
            color: '#e8e8ff', stroke: '#2255bb', strokeThickness: 5
        }).setOrigin(0.5);
        this.add.text(W/2, 178, 'ESCAPE THE NIGHT', {
            fontSize: '23px', fontFamily: 'monospace', color: '#6688ee'
        }).setOrigin(0.5);

        g.fillStyle(0x00001a, 0.80);
        g.lineStyle(1, 0x334466, 0.7);
        g.fillRect(160, 228, 704, 210);
        g.strokeRect(160, 228, 704, 210);

        [
            ['🌑', 'Księżycowa noc nadciąga z lewej — pochłonie Twój habitat'],
            ['🛣️', 'Kliknij teren PRZED habitatem aby zbudować drogę (za darmo!)'],
            ['🔋', 'Baterie +25% moc  |  Klucze naprawcze +25% kadłub  (B / R)'],
            ['🚀', 'W/S/A/D=jazda  SHIFT=turbo (spala paliwo+O₂)  F=światła'],
            ['🕳️', 'Kratery są nieprzejezdne — buduj drogę dookoła nich'],
        ].forEach(([icon, txt], i) => {
            this.add.text(190, 248 + i * 36, `${icon}  ${txt}`, {
                fontSize: '14px', fontFamily: 'monospace', color: '#aaaacc'
            });
        });

        const btn = this.add.text(W/2, 472, '[ NACIŚNIJ ENTER ABY ROZPOCZĄĆ ]', {
            fontSize: '22px', fontFamily: 'monospace',
            color: '#ffff44', stroke: '#888800', strokeThickness: 2
        }).setOrigin(0.5);
        this.tweens.add({ targets: btn, alpha: { from: 1, to: 0.35 }, duration: 700, yoyo: true, repeat: -1 });
        this.input.keyboard.on('keydown-ENTER', () => this.scene.start('Game'));

        // Replay last road option
        const hasSaved = !!localStorage.getItem('lunarRoad');
        if (hasSaved) {
            const btn2 = this.add.text(W/2, 530, '[ BACKSPACE — JEDŹ PO OSTATNIEJ TRASIE ]', {
                fontSize: '15px', fontFamily: 'monospace',
                color: '#88bbff', stroke: '#001144', strokeThickness: 2
            }).setOrigin(0.5);
            this.tweens.add({ targets: btn2, alpha: { from: 0.9, to: 0.35 }, duration: 900, yoyo: true, repeat: -1 });
            this.input.keyboard.on('keydown-BACKSPACE', () => this.scene.start('Game', { replayRoad: true }));
        }
    }
}

// ════════════════════════════════════════════════════════════
//  GAME OVER
// ════════════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene {
    constructor() { super('GameOver'); }
    create(data) {
        const d = data || {};
        const cause = d.cause || 'power';
        const cfg = {
            oxygen: { bg: 0x000818, glow: 0x001830, title: 'BRAK TLENU',           color: '#44aaff', stroke: '#001840', sub: 'Systemy podtrzymania życia zakończyły pracę.' },
            hull:   { bg: 0x100800, glow: 0x281000, title: 'ZNISZCZENIE KADŁUBA',  color: '#ff8833', stroke: '#441100', sub: 'Pojazd rozbił się o księżycowe głazy.' },
            power:  { bg: 0x040004, glow: 0x200000, title: 'UTRATA ZASILANIA',     color: '#ff3333', stroke: '#550000', sub: 'Księżycowa noc pochłonęła Twój habitat.' },
        }[cause] || cfg.power;
        const g = this.add.graphics();
        g.fillStyle(cfg.bg, 1); g.fillRect(0, 0, W, H);
        g.fillStyle(cfg.glow, 0.55); g.fillCircle(W/2, H/2, 380);
        this.add.text(W/2, 140, cfg.title, {
            fontSize: '54px', fontFamily: 'monospace',
            color: cfg.color, stroke: cfg.stroke, strokeThickness: 4
        }).setOrigin(0.5);
        this.add.text(W/2, 215, cfg.sub, {
            fontSize: '18px', fontFamily: 'monospace', color: '#999999'
        }).setOrigin(0.5);
        g.fillStyle(0x0a0010, 0.88); g.lineStyle(1, 0x333355, 1);
        g.fillRect(W/2 - 235, 260, 470, 135); g.strokeRect(W/2 - 235, 260, 470, 135);
        [
            [`Pokonana odległość: ${d.distance || 0} m`,     '#ffdd44', 292],
            [`Zbudowane odcinki drogi: ${d.roadBuilt || 0}`, '#88ffaa', 327],
            [`Prędkość nocy na końcu: ${d.nightSpeed || 36} m/s`, '#ff8844', 362],
        ].forEach(([t, c, y]) => {
            this.add.text(W/2, y, t, { fontSize: '19px', fontFamily: 'monospace', color: c }).setOrigin(0.5);
        });
        const btn = this.add.text(W/2, 455, '[ NACIŚNIJ ENTER ABY SPRÓBOWAĆ PONOWNIE ]', {
            fontSize: '18px', fontFamily: 'monospace', color: '#ffff44'
        }).setOrigin(0.5);
        this.tweens.add({ targets: btn, alpha: { from: 1, to: 0.3 }, duration: 700, yoyo: true, repeat: -1 });
        this.input.keyboard.on('keydown-ENTER', () => this.scene.start('Game'));
    }
}

// ════════════════════════════════════════════════════════════
//  GAME
// ════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
    constructor() { super('Game'); }

    create(data) {
        this.power      = 100;
        this.oxygen     = 100;
        this.hull       = 100;
        this.fuel       = 100;
        this.demolishCounts     = {};
        this.o2Failure          = false;
        this.driveFailure       = false;
        this.driveFailTimer     = 0;
        this.driveFailCooldown  = 45 + Math.random() * 45; // first failure 45-90 s
        this.o2FailTimer        = 0;
        this.o2FailCooldown     = 35 + Math.random() * 40;
        this.solarFailure       = false;
        this.solarFailTimer     = 0;
        this.solarFailCooldown  = 50 + Math.random() * 50; // first failure 50-100 s
        this.batteriesCollected  = 0;
        this.repairKitsCollected = 0;
        this.scrapCollected      = 0;
        this.glassCollected      = 0;
        this.plasticCollected    = 0;
        this.roadBuilt  = 0;
        this.nightWorldX = -264; // habX (216) - 480 initial gap
        this.nightSpeed  = 26;
        this.gameTime    = 0;
        this.previewTile = null;
        this.trail       = [];
        this.trailTimer  = 0;
        this.turboActive = false;
        this.lightsOn    = false;
        this.meteorCooldown  = 3 + Math.random() * 4; // first impact 3-7 s
        this.meteorFlashes   = []; // { c, r, life }
        this.incomingMeteors = []; // { c, r, timer, dur, ox, oy } — in-flight
        this.dustClouds      = []; // { wx, wy, life, maxLife }
        this.habVX       = 0;
        this.habAngle    = 0; // radians, 0 = facing right

        // ── Grid ──────────────────────────────────────────────
        this.grid = Array.from({ length: COLS }, () => new Array(ROWS).fill(T_EMPTY));

        if (data && data.replayRoad) {
            // Restore full grid from localStorage
            try {
                const flat = JSON.parse(localStorage.getItem('lunarRoad') || '[]');
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) {
                        const v = flat[c * ROWS + r];
                        if (v !== undefined) this.grid[c][r] = v;
                    }
            } catch(e) {
                this.generateObstacles();
            }
            try {
                const wd = JSON.parse(localStorage.getItem('lunarWreck') || 'null');
                // Discard wreck if it's within 8 tiles of the start — would block the player
                this.wreckData = (wd && wd.x > 8 * TILE) ? wd : null;
            } catch(e) { this.wreckData = null; }
            try {
                this.structures = JSON.parse(localStorage.getItem('lunarStructures') || '[]');
            } catch(e) { this.structures = []; }
        } else {
            this.wreckData = null;
            this.structures = [];
            for (let c = 0; c < 9; c++)
                for (let r = 0; r < ROWS; r++) this.grid[c][r] = T_ROAD;
            this.generateObstacles();
        }

        // ── Pickups ───────────────────────────────────────────
        this.pickups = [];
        for (let c = 11; c < COLS - 5; c += 8 + Math.floor(Math.random() * 6)) {
            const cands = [];
            for (let r = 0; r < ROWS; r++)
                if (this.grid[c][r] === T_EMPTY) cands.push(r);
            if (cands.length) {
                const r = cands[Math.floor(Math.random() * cands.length)];
                this.pickups.push({ c, r, collected: false });
            }
        }

        // ── Repair kits ───────────────────────────────────────
        this.repairKits = [];
        for (let c = 20; c < COLS - 5; c += 18 + Math.floor(Math.random() * 14)) {
            const cands = [];
            for (let r = 0; r < ROWS; r++)
                if (this.grid[c][r] === T_EMPTY) cands.push(r);
            if (cands.length) {
                const r = cands[Math.floor(Math.random() * cands.length)];
                this.repairKits.push({ c, r, collected: false });
            }
        }

        // ── Fuel canisters ────────────────────────────────────
        this.fuelCanisters = [];
        for (let c = 14; c < COLS - 5; c += 12 + Math.floor(Math.random() * 8)) {
            const cands = [];
            for (let r = 0; r < ROWS; r++)
                if (this.grid[c][r] === T_EMPTY) cands.push(r);
            if (cands.length) {
                const r = cands[Math.floor(Math.random() * cands.length)];
                this.fuelCanisters.push({ c, r, collected: false });
            }
        }

        // ── Scrap piles ───────────────────────────────────────
        this.scrapPiles = [];
        for (let c = 15; c < COLS - 5; c += 10 + Math.floor(Math.random() * 6)) {
            const cands = [];
            for (let r = 0; r < ROWS; r++)
                if (this.grid[c][r] === T_EMPTY) cands.push(r);
            if (cands.length) {
                const r = cands[Math.floor(Math.random() * cands.length)];
                this.scrapPiles.push({ c, r, collected: false });
            }
        }

        // ── Glass shards ──────────────────────────────────────
        this.glassShards = [];
        for (let c = 18; c < COLS - 5; c += 14 + Math.floor(Math.random() * 8)) {
            const cands = [];
            for (let r = 0; r < ROWS; r++)
                if (this.grid[c][r] === T_EMPTY) cands.push(r);
            if (cands.length) {
                const r = cands[Math.floor(Math.random() * cands.length)];
                this.glassShards.push({ c, r, collected: false });
            }
        }

        // ── Plastic debris ────────────────────────────────────
        this.plasticDebris = [];
        for (let c = 12; c < COLS - 5; c += 13 + Math.floor(Math.random() * 7)) {
            const cands = [];
            for (let r = 0; r < ROWS; r++)
                if (this.grid[c][r] === T_EMPTY) cands.push(r);
            if (cands.length) {
                const r = cands[Math.floor(Math.random() * cands.length)];
                this.plasticDebris.push({ c, r, collected: false });
            }
        }

        // ── Habitat ───────────────────────────────────────────
        this.habX   = 4 * TILE + TILE / 2;
        this.habY   = OY + 5 * TILE + TILE / 2;
        this.startX = this.habX;

        // ── Camera ────────────────────────────────────────────
        this.cameras.main.setBounds(0, 0, COLS * TILE, H);
        this.cameras.main.scrollX = this.habX - W / 3;

        // ── Layers ────────────────────────────────────────────
        // background
        const bg = this.add.graphics().setDepth(0);
        bg.fillStyle(0x000010, 1); bg.fillRect(0, 0, COLS * TILE, H);
        // border areas (space above/below the tile grid)
        bg.fillStyle(0x000008, 1);
        bg.fillRect(0, 0, COLS * TILE, OY);
        bg.fillRect(0, OY + ROWS * TILE, COLS * TILE, H - OY - ROWS * TILE);

        const starG = this.add.graphics().setDepth(0);
        for (let i = 0; i < 200; i++) {
            const sx = Math.random() * COLS * TILE;
            const inTop = Math.random() < 0.5;
            const sy = inTop ? Math.random() * OY : OY + ROWS * TILE + Math.random() * (H - OY - ROWS * TILE);
            starG.fillStyle(0xffffff, Math.random() * 0.55 + 0.15);
            starG.fillRect(sx, sy, 1, 1);
        }

        this.terrainGfx = this.add.graphics().setDepth(1);
        this.pickupGfx  = this.add.graphics().setDepth(2);
        this.trailGfx   = this.add.graphics().setDepth(2);
        this.habitatGfx = this.add.graphics().setDepth(3);
        this.previewGfx = this.add.graphics().setScrollFactor(0).setDepth(5);
        this.nightGfx   = this.add.graphics().setScrollFactor(0).setDepth(10);
        this.lightGfx   = this.add.graphics().setScrollFactor(0).setDepth(12);
        this.uiGfx      = this.add.graphics().setScrollFactor(0).setDepth(20);


        // ── UI text ───────────────────────────────────────────
        const ts = { fontSize: '15px', fontFamily: 'monospace', color: '#ddddff' };
        this.powerTxt = this.add.text(24, 18, '', ts).setScrollFactor(0).setDepth(21);
        this.resTxt   = this.add.text(24, 42, '', { ...ts, color: '#ffee44' }).setScrollFactor(0).setDepth(21);
        this.distTxt  = this.add.text(W-24, 18, '', { ...ts, color: '#88ffbb', align: 'right' })
                            .setOrigin(1, 0).setScrollFactor(0).setDepth(21);
        this.nightTxt = this.add.text(W-24, 42, '', { ...ts, color: '#ff8844', align: 'right' })
                            .setOrigin(1, 0).setScrollFactor(0).setDepth(21);
        this.hintTxt  = this.add.text(W/2, H-14, 'W=jedź  S=ham  A/D=skręt  SHIFT=turbo  F=światła  B=bat  R=naprawa  L=wyciągarka  SPACJA=buduj', {
            fontSize: '13px', fontFamily: 'monospace', color: '#4444aa'
        }).setOrigin(0.5, 1).setScrollFactor(0).setDepth(21);
        this.warnTxt  = this.add.text(W/2, 86, '', {
            fontSize: '20px', fontFamily: 'monospace',
            color: '#ff5533', stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5).setScrollFactor(0).setDepth(22);
        this.oxygenTxt = this.add.text(24, 102, '', {
            fontSize: '12px', fontFamily: 'monospace', color: '#66ccff'
        }).setScrollFactor(0).setDepth(21);
        this.hullTxt = this.add.text(24, 120, '', {
            fontSize: '12px', fontFamily: 'monospace', color: '#ffaa44'
        }).setScrollFactor(0).setDepth(21);

        // ── Build system ──────────────────────────────────────
        this.BUILD_ITEMS = [
            {
                id: 'charging_station',
                name: 'Stacja Ładowania',
                desc: 'Ładuje baterię w dzień (+20%/s)',
                cost: { glass: 5, plastic: 3, scrap: 2 }
            },
            {
                id: 'oxygen_station',
                name: 'Stacja Tlenowa',
                desc: 'Uzupełnia tlen zawsze (+25%/s)',
                cost: { glass: 3, plastic: 4, scrap: 1 }
            },
            {
                id: 'fuel_station',
                name: 'Stacja Paliwowa',
                desc: 'Uzupełnia paliwo rakietowe (+20%/s)',
                cost: { glass: 2, plastic: 3, scrap: 4 }
            }
        ];
        this.buildGfx = this.add.graphics().setScrollFactor(0).setDepth(40);
        const bmts = { fontSize: '16px', fontFamily: 'monospace', color: '#eeeeff', stroke: '#000022', strokeThickness: 2 };
        const bmtsItem = { fontSize: '14px', fontFamily: 'monospace', color: '#ffee88', stroke: '#000022', strokeThickness: 2 };
        const bmtsDesc = { fontSize: '12px', fontFamily: 'monospace', color: '#99aacc' };
        this.buildMenuTitleTxt = this.add.text(W/2, H/2 - 80, '⚒ MENU BUDOWANIA  [SPACJA=zamknij  ESC=anuluj]', bmts)
            .setOrigin(0.5, 0).setScrollFactor(0).setDepth(41).setVisible(false);
        this.buildItemTxts = this.BUILD_ITEMS.map((item, i) => {
            const costStr = `💎${item.cost.glass || 0} 🧩${item.cost.plastic || 0} ⚙${item.cost.scrap || 0}`;
            // Text starts to the right of the 48px graphic preview (bx+15+48+12 = bx+75 = W/2-145)
            return this.add.text(W/2 - 145, H/2 - 30 + i * 80,
                `[${i + 1}]  ${item.name}\n       ${costStr}\n       ${item.desc}`,
                bmtsItem).setOrigin(0, 0).setScrollFactor(0).setDepth(41).setVisible(false);
        });
        this.buildModeTxt = this.add.text(W/2, H - 36, '', {
            fontSize: '13px', fontFamily: 'monospace', color: '#88ffcc', stroke: '#001100', strokeThickness: 2
        }).setOrigin(0.5, 1).setScrollFactor(0).setDepth(41).setVisible(false);

        this.input.on('pointerdown', this.onPointerDown, this);
        this.input.on('pointermove', this.onPointerMove, this);
        const KC = Phaser.Input.Keyboard.KeyCodes;
        this.turboKey = this.input.keyboard.addKey(KC.SHIFT);
        this.wKey = this.input.keyboard.addKey(KC.W);
        this.sKey = this.input.keyboard.addKey(KC.S);
        this.aKey = this.input.keyboard.addKey(KC.A);
        this.dKey = this.input.keyboard.addKey(KC.D);
        this.fKey = this.input.keyboard.addKey(KC.F);
        this.bKey = this.input.keyboard.addKey(KC.B);
        this.rKey = this.input.keyboard.addKey(KC.R);
        this.lKey = this.input.keyboard.addKey(KC.L);
        this.escKey = this.input.keyboard.addKey(KC.ESC);
        this.spaceKey = this.input.keyboard.addKey(KC.SPACE);
        this.oneKey   = this.input.keyboard.addKey(KC.ONE);
        this.twoKey   = this.input.keyboard.addKey(KC.TWO);
        this.threeKey = this.input.keyboard.addKey(KC.THREE);

        // ── Pause overlay ─────────────────────────────────────
        this.gamePaused  = false;
        this.winchActive = false;
        this.winchAnchor = null;
        this.buildMenuOpen = false;
        this.buildMode     = null;   // null or { id: 'charging_station' }
        this.structures    = this.structures || [];
        this.pauseGfx = this.add.graphics().setScrollFactor(0).setDepth(50);
        const pts = { fontSize: '28px', fontFamily: 'monospace', color: '#ffffff', stroke: '#000000', strokeThickness: 3 };
        const ptsSmall = { fontSize: '18px', fontFamily: 'monospace', color: '#ffff88', stroke: '#000000', strokeThickness: 2 };
        const ptsHint  = { fontSize: '15px', fontFamily: 'monospace', color: '#8888cc' };
        this.pauseTitleTxt  = this.add.text(W/2, 210, 'PAUZA', pts).setOrigin(0.5).setScrollFactor(0).setDepth(51);
        this.pauseResumeTxt = this.add.text(W/2, 290, '[ ESC / ENTER — WRÓĆ DO GRY ]', ptsSmall).setOrigin(0.5).setScrollFactor(0).setDepth(51);
        this.pauseNewTxt    = this.add.text(W/2, 340, '[ N — NOWA GRA ]', ptsSmall).setOrigin(0.5).setScrollFactor(0).setDepth(51);
        this.pauseMenuTxt   = this.add.text(W/2, 390, '[ M — MENU GŁÓWNE ]', ptsSmall).setOrigin(0.5).setScrollFactor(0).setDepth(51);
        this.pauseHintTxt   = this.add.text(W/2, 450, 'postęp zostanie utracony przy nowej grze', ptsHint).setOrigin(0.5).setScrollFactor(0).setDepth(51);
        this.setPauseVisible(false);
    }

    // ── Obstacle generation ───────────────────────────────────
    generateObstacles() {
        let wallCooldown = 0;
        let largeCraterCooldown = 0;

        for (let c = 12; c < COLS - 4; c++) {
            wallCooldown--;
            largeCraterCooldown--;

            // Periodic wall with gap
            if (wallCooldown <= 0 && c > 25) {
                wallCooldown = 28 + Math.floor(Math.random() * 22);
                const gapStart = 1 + Math.floor(Math.random() * (ROWS - 4));
                const gapSize  = 2 + Math.floor(Math.random() * 2);
                for (let r = 0; r < ROWS; r++) {
                    if (r < gapStart || r >= gapStart + gapSize) {
                        this.grid[c][r] = T_CRATER;
                        if (c + 1 < COLS) this.grid[c+1][r] = T_CRATER;
                    }
                }
                continue;
            }

            // Large crater (oval, 2-4 wide × 2-5 tall)
            if (largeCraterCooldown <= 0 && Math.random() < 0.12) {
                largeCraterCooldown = 12 + Math.floor(Math.random() * 10);
                const cr = Math.floor(Math.random() * ROWS);
                const cw = 2 + Math.floor(Math.random() * 3);
                const ch = 2 + Math.floor(Math.random() * 4);
                for (let dc = 0; dc < cw; dc++) {
                    for (let dr = 0; dr < ch; dr++) {
                        const tc = c + dc, tr = cr + dr;
                        if (tc < COLS && tr >= 0 && tr < ROWS)
                            this.grid[tc][tr] = T_CRATER;
                    }
                }
            }

            // Small craters
            const density = 0.06 + (c / COLS) * 0.08;
            if (Math.random() < density) {
                const r = Math.floor(Math.random() * ROWS);
                const size = 1 + Math.floor(Math.random() * 2);
                for (let dr = 0; dr < size; dr++) {
                    const tr = r + dr;
                    if (tr >= 0 && tr < ROWS) this.grid[c][tr] = T_CRATER;
                }
            }

            // Boulders — single rocks and small clusters
            if (this.grid[c].every(t => t !== T_CRATER) && Math.random() < 0.09) {
                const r = Math.floor(Math.random() * ROWS);
                this.grid[c][r] = T_BOULDER;
                if (Math.random() < 0.45 && r + 1 < ROWS)
                    this.grid[c][r + 1] = T_BOULDER;
            }

            // Safety: min 3 passable tiles per column
            const passable = this.grid[c].filter(t => t === T_EMPTY || t === T_ROAD).length;
            if (passable < 3) {
                const mid = Math.floor(ROWS / 2);
                this.grid[c][mid]   = T_EMPTY;
                this.grid[c][mid-1] = T_EMPTY;
                this.grid[c][mid+1] = T_EMPTY;
            }
        }
    }

    isWreckTile(c, r) {
        if (!this.wreckData) return false;
        return c === Math.floor(this.wreckData.x / TILE) &&
               r === Math.floor((this.wreckData.y - OY) / TILE);
    }

    isPassable(c, r) {
        if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
        if (this.isWreckTile(c, r)) return false;
        const t = this.grid[c][r];
        return t !== T_CRATER && t !== T_BOULDER;
    }

    isBoulder(c, r) {
        if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
        return this.grid[c][r] === T_BOULDER;
    }

    // ── Terrain drawing ───────────────────────────────────────
    redrawTerrain() {
        const g = this.terrainGfx; g.clear();
        const camL  = this.cameras.main.scrollX;
        const cS = Math.max(0, Math.floor(camL / TILE) - 1);
        const cE = Math.min(COLS - 1, Math.ceil((camL + W) / TILE) + 1);

        for (let c = cS; c <= cE; c++) {
            for (let r = 0; r < ROWS; r++) {
                const x = c * TILE, y = OY + r * TILE;
                const t = this.grid[c][r];

                if (t === T_CRATER) {
                    g.fillStyle(0x222230, 1); g.fillRect(x, y, TILE, TILE);
                    g.fillStyle(0x16161f, 1); g.fillEllipse(x+TILE/2, y+TILE/2, TILE*0.84, TILE*0.84);
                    g.lineStyle(1, 0x2e2e40, 0.8); g.strokeEllipse(x+TILE/2, y+TILE/2, TILE*0.96, TILE*0.96);
                    g.lineStyle(1, 0x484862, 0.4); g.strokeEllipse(x+TILE/2-2, y+TILE/2-2, TILE*0.78, TILE*0.72);
                } else if (t === T_ROAD) {
                    g.fillStyle(0x686878, 1); g.fillRect(x, y, TILE, TILE);
                    if (c % 4 === 0) {
                        g.fillStyle(0xccccaa, 0.32);
                        g.fillRect(x+TILE/2-4, y+6, 8, 8);
                        g.fillRect(x+TILE/2-4, y+TILE-14, 8, 8);
                    }
                    g.lineStyle(1, 0x555565, 0.28); g.strokeRect(x, y, TILE, TILE);
                } else if (t === T_BOULDER) {
                    // base regolith
                    const v = 0x36 + ((c*5 + r*9) % 14);
                    g.fillStyle((v<<16)|(v<<8)|(v+8), 1); g.fillRect(x, y, TILE, TILE);
                    // rock body
                    g.fillStyle(0x887766, 1);
                    g.fillRect(x+5, y+6, TILE-10, TILE-11);
                    // highlight (top-left)
                    g.fillStyle(0xbbaa99, 0.85);
                    g.fillTriangle(x+5, y+6, x+TILE-5, y+6, x+5, y+TILE-5);
                    // shadow (bottom-right)
                    g.fillStyle(0x443322, 0.80);
                    g.fillTriangle(x+TILE-5, y+6, x+TILE-5, y+TILE-5, x+5, y+TILE-5);
                    // top face (center flat)
                    g.fillStyle(0x998877, 1);
                    g.fillRect(x+9, y+10, TILE-18, TILE-20);
                    // surface cracks
                    g.lineStyle(1, 0x554433, 0.6);
                    g.lineBetween(x+11, y+12, x+TILE/2, y+TILE-14);
                    g.lineBetween(x+TILE/2, y+12, x+TILE-12, y+TILE-14);
                    // edge outline
                    g.lineStyle(1, 0x332211, 0.9); g.strokeRect(x+5, y+6, TILE-10, TILE-11);
                } else {
                    const v = 0x36 + ((c*5 + r*9) % 14);
                    g.fillStyle((v<<16)|(v<<8)|(v+8), 1); g.fillRect(x, y, TILE, TILE);
                    if ((c*3 + r*7) % 6 === 0) {
                        g.fillStyle(0x444454, 0.55);
                        g.fillRect(x + (c*11)%38+5, y + (r*13)%38+5, 3, 3);
                    }
                    g.lineStyle(1, 0x2e2e3e, 0.22); g.strokeRect(x, y, TILE, TILE);
                }

                // Demolish progress overlay
                const dmKey = `${c}_${r}`;
                const dmCnt = this.demolishCounts[dmKey];
                if (dmCnt) {
                    const frac = dmCnt / 15;
                    g.fillStyle(0xff6600, frac * 0.35); g.fillRect(x, y, TILE, TILE);
                    g.fillStyle(0x220000, 0.75); g.fillRect(x + 3, y + TILE - 9, TILE - 6, 6);
                    g.fillStyle(0xff7700, 0.95); g.fillRect(x + 3, y + TILE - 9, Math.round((TILE - 6) * frac), 6);
                    g.lineStyle(1, 0xff4400, 0.6); g.strokeRect(x + 3, y + TILE - 9, TILE - 6, 6);
                }
            }
        }
    }

    // ── Pickups drawing (batteries + repair kits) ────────────
    redrawPickups() {
        const g = this.pickupGfx; g.clear();
        const camL = this.cameras.main.scrollX;

        // Batteries
        for (const p of this.pickups) {
            if (p.collected) continue;
            const wx = p.c * TILE + TILE/2;
            if (wx < camL - TILE || wx > camL + W + TILE) continue;
            const wy = OY + p.r * TILE + TILE/2;
            const pulse = Math.sin(this.gameTime * 3 + p.c) * 0.3 + 0.7;

            g.fillStyle(0xffee00, 0.1 * pulse); g.fillCircle(wx, wy, 20);
            g.fillStyle(0x333300, 1); g.fillRect(wx - 12, wy - 7, 24, 14);
            g.fillStyle(0xaaff00, 1); g.fillRect(wx - 10, wy - 5, 18, 10);
            g.fillStyle(0xeeff88, 0.7); g.fillRect(wx - 10, wy - 5, 18, 4);
            g.fillStyle(0x555500, 1); g.fillRect(wx + 12, wy - 3, 4, 6);
            g.lineStyle(1, 0xffff44, 0.8); g.strokeRect(wx - 12, wy - 7, 24, 14);
            if (pulse > 0.95) { g.fillStyle(0xffffff, 0.5); g.fillRect(wx - 10, wy - 5, 4, 10); }
        }

        // Repair kits (wrench icon, cyan tint)
        for (const k of this.repairKits) {
            if (k.collected) continue;
            const wx = k.c * TILE + TILE/2;
            if (wx < camL - TILE || wx > camL + W + TILE) continue;
            const wy = OY + k.r * TILE + TILE/2;
            const pulse = Math.sin(this.gameTime * 2.5 + k.c * 0.7) * 0.3 + 0.7;

            // Glow
            g.fillStyle(0x00ffcc, 0.12 * pulse); g.fillCircle(wx, wy, 22);

            // Wrench handle (top-down: angled bar)
            g.fillStyle(0x224444, 1);
            g.fillRect(wx - 10, wy - 3, 20, 6); // main shaft
            g.fillRect(wx - 3, wy - 10, 6, 20); // cross shaft (cross shape)

            // Metal sheen
            g.fillStyle(0x44ddcc, 1);
            g.fillRect(wx - 8, wy - 2, 16, 4);
            g.fillRect(wx - 2, wy - 8, 4, 16);

            // Head circles (ends of wrench)
            g.fillStyle(0x00bbaa, 1); g.fillCircle(wx + 9, wy, 5);
            g.fillStyle(0x00bbaa, 1); g.fillCircle(wx - 9, wy, 5);
            g.fillStyle(0x003333, 1); g.fillCircle(wx + 9, wy, 2);
            g.fillStyle(0x003333, 1); g.fillCircle(wx - 9, wy, 2);

            // Highlight
            g.fillStyle(0xaaffee, 0.6 * pulse); g.fillRect(wx - 8, wy - 2, 6, 2);

            // Border
            g.lineStyle(1, 0x44ffdd, 0.7 * pulse);
            g.strokeCircle(wx, wy, 14);
        }

        // Fuel canisters (red cylinder top-down)
        for (const f of this.fuelCanisters) {
            if (f.collected) continue;
            const wx = f.c * TILE + TILE/2;
            if (wx < camL - TILE || wx > camL + W + TILE) continue;
            const wy = OY + f.r * TILE + TILE/2;
            const pulse = Math.sin(this.gameTime * 3.5 + f.c * 1.3) * 0.3 + 0.7;

            // Glow
            g.fillStyle(0xff4400, 0.12 * pulse); g.fillCircle(wx, wy, 22);

            // Canister body (cylinder viewed top-down = ellipse/rect)
            g.fillStyle(0x440000, 1); g.fillRect(wx - 9, wy - 13, 18, 26);
            g.fillStyle(0xcc2200, 1); g.fillRect(wx - 7, wy - 11, 14, 22);

            // Danger stripes
            g.fillStyle(0xffaa00, 1);
            g.fillRect(wx - 7, wy - 4, 14, 4);
            g.fillRect(wx - 7, wy + 4, 14, 3);

            // Cap top/bottom
            g.fillStyle(0x882200, 1); g.fillRect(wx - 9, wy - 13, 18, 4);
            g.fillStyle(0x882200, 1); g.fillRect(wx - 9, wy + 9, 18, 4);

            // Nozzle
            g.fillStyle(0x555555, 1); g.fillRect(wx - 3, wy - 16, 6, 4);
            g.fillStyle(0x888888, 1); g.fillRect(wx - 2, wy - 17, 4, 2);

            // Highlight
            g.fillStyle(0xff8866, 0.5 * pulse); g.fillRect(wx - 6, wy - 10, 3, 8);

            // Border
            g.lineStyle(1, 0xff6633, 0.8 * pulse); g.strokeRect(wx - 9, wy - 13, 18, 26);
        }

        // Scrap piles (grey metallic chunks)
        for (const s of this.scrapPiles) {
            if (s.collected) continue;
            const wx = s.c * TILE + TILE/2;
            if (wx < camL - TILE || wx > camL + W + TILE) continue;
            const wy = OY + s.r * TILE + TILE/2;
            const pulse = Math.sin(this.gameTime * 1.8 + s.c * 0.9) * 0.25 + 0.75;
            g.fillStyle(0x888899, 0.15 * pulse); g.fillCircle(wx, wy, 18);
            // irregular metal chunks
            g.fillStyle(0x555566, 1); g.fillRect(wx - 10, wy - 6, 14, 8);
            g.fillStyle(0x778899, 1); g.fillRect(wx - 6, wy - 10, 9, 6);
            g.fillStyle(0x99aabb, 1); g.fillRect(wx - 2, wy + 2, 12, 5);
            // metallic highlights
            g.fillStyle(0xbbccdd, 0.7); g.fillRect(wx - 9, wy - 5, 5, 2);
            g.fillStyle(0xbbccdd, 0.5); g.fillRect(wx - 5, wy - 9, 4, 2);
            g.lineStyle(1, 0xaabbcc, 0.6 * pulse);
            g.strokeRect(wx - 10, wy - 10, 20, 18);
        }

        // Glass shards (cyan/blue translucent diamonds)
        for (const s of this.glassShards) {
            if (s.collected) continue;
            const wx = s.c * TILE + TILE/2;
            if (wx < camL - TILE || wx > camL + W + TILE) continue;
            const wy = OY + s.r * TILE + TILE/2;
            const pulse = Math.sin(this.gameTime * 4 + s.c * 1.7) * 0.35 + 0.65;
            g.fillStyle(0x88ddff, 0.18 * pulse); g.fillCircle(wx, wy, 20);
            // diamond shards
            g.fillStyle(0x44aacc, 0.85);
            g.fillTriangle(wx, wy - 12, wx + 9, wy, wx, wy + 8);
            g.fillStyle(0x66ccee, 0.9);
            g.fillTriangle(wx - 9, wy - 4, wx + 4, wy - 8, wx - 3, wy + 10);
            g.fillStyle(0x99eeff, 0.7);
            g.fillTriangle(wx + 3, wy - 6, wx + 11, wy + 4, wx + 2, wy + 9);
            // internal reflections
            g.fillStyle(0xffffff, 0.5 * pulse); g.fillRect(wx - 7, wy - 3, 3, 2);
            g.fillStyle(0xffffff, 0.4 * pulse); g.fillRect(wx + 4, wy - 5, 2, 3);
            g.lineStyle(1, 0xaaeeff, 0.7 * pulse);
            g.strokeCircle(wx, wy, 13);
        }

        // Plastic debris (yellow/orange fragments)
        for (const s of this.plasticDebris) {
            if (s.collected) continue;
            const wx = s.c * TILE + TILE/2;
            if (wx < camL - TILE || wx > camL + W + TILE) continue;
            const wy = OY + s.r * TILE + TILE/2;
            const pulse = Math.sin(this.gameTime * 2.5 + s.c * 1.2) * 0.3 + 0.7;
            g.fillStyle(0xffcc00, 0.15 * pulse); g.fillCircle(wx, wy, 18);
            // plastic fragments
            g.fillStyle(0xdd8800, 1); g.fillRect(wx - 10, wy - 5, 12, 7);
            g.fillStyle(0xffbb22, 1); g.fillRect(wx - 2, wy - 9, 11, 6);
            g.fillStyle(0xff9900, 1); g.fillRect(wx - 7, wy + 3, 13, 5);
            // plastic sheen
            g.fillStyle(0xffeeaa, 0.6 * pulse); g.fillRect(wx - 8, wy - 4, 4, 2);
            g.fillStyle(0xffeeaa, 0.4 * pulse); g.fillRect(wx, wy - 8, 5, 2);
            g.lineStyle(1, 0xffcc44, 0.65 * pulse);
            g.strokeRect(wx - 11, wy - 10, 21, 18);
        }

        // Charging stations
        for (const st of this.structures) {
            if (st.id !== 'charging_station') continue;
            const wx = st.c * TILE;
            const wy = OY + st.r * TILE;
            if (wx < camL - TILE || wx + TILE > camL + W + TILE) continue;
            const cx = wx + TILE / 2, cy = wy + TILE / 2;
            if (!st.built) {
                // Under construction — grey scaffold
                const prog = st.buildClicks / 20;
                g.fillStyle(0x222233, 1); g.fillRect(wx + 2, wy + 2, TILE - 4, TILE - 4);
                g.fillStyle(0x444455, 0.7); g.fillRect(wx + 5, wy + 5, TILE - 10, TILE - 10);
                // Partial yellow strips based on progress
                g.fillStyle(0x886600, 0.8);
                g.fillRect(wx + 5, wy + 5, TILE - 10, 3);
                g.fillRect(wx + 5, wy + TILE - 8, TILE - 10, 3);
                if (prog > 0.3) { g.fillRect(wx + 5, wy + 5, 3, TILE - 10); }
                if (prog > 0.6) { g.fillRect(wx + TILE - 8, wy + 5, 3, TILE - 10); }
                // Grey bolt
                g.fillStyle(0x778877, 0.7);
                g.fillTriangle(cx+4, cy-11, cx-5, cy+1, cx+2, cy+1);
                g.fillTriangle(cx-4, cy+11, cx+5, cy-1, cx-2, cy-1);
                // Progress bar at bottom
                g.fillStyle(0x222233, 1); g.fillRect(wx + 5, wy + TILE - 6, TILE - 10, 4);
                g.fillStyle(0xffaa00, 0.9); g.fillRect(wx + 5, wy + TILE - 6, Math.round((TILE - 10) * prog), 4);
                // Dashed border
                g.lineStyle(1, 0x556655, 0.9); g.strokeRect(wx + 2, wy + 2, TILE - 4, TILE - 4);
            } else {
                // Active station
                g.fillStyle(0x333344, 1); g.fillRect(wx + 2, wy + 2, TILE - 4, TILE - 4);
                g.fillStyle(0x555566, 1); g.fillRect(wx + 5, wy + 5, TILE - 10, TILE - 10);
                g.fillStyle(0xffcc00, 1);
                g.fillRect(wx + 5, wy + 5, TILE - 10, 3);
                g.fillRect(wx + 5, wy + TILE - 8, TILE - 10, 3);
                g.fillRect(wx + 5, wy + 5, 3, TILE - 10);
                g.fillRect(wx + TILE - 8, wy + 5, 3, TILE - 10);
                g.fillStyle(0xffff44, 1);
                g.fillTriangle(cx + 4, cy - 11, cx - 5, cy + 1, cx + 2, cy + 1);
                g.fillTriangle(cx - 4, cy + 11, cx + 5, cy - 1, cx - 2, cy - 1);
                // Reserve bar (bottom of tile)
                const pres = (st.powerReserve !== undefined ? st.powerReserve : 1200) / 1200;
                g.fillStyle(0x221100, 1); g.fillRect(wx+5, wy+TILE-6, TILE-10, 4);
                const pbarColor = pres > 0.4 ? 0xddaa00 : pres > 0.15 ? 0xff9900 : 0xff2200;
                g.fillStyle(pbarColor, 0.9); g.fillRect(wx+5, wy+TILE-6, Math.round((TILE-10)*pres), 4);
                g.lineStyle(2, 0xaaaa33, 0.85); g.strokeRect(wx + 2, wy + 2, TILE - 4, TILE - 4);
            }
        }

        // Oxygen stations
        for (const st of this.structures) {
            if (st.id !== 'oxygen_station') continue;
            const wx = st.c * TILE;
            const wy = OY + st.r * TILE;
            if (wx < camL - TILE || wx + TILE > camL + W + TILE) continue;
            const cx = wx + TILE/2, cy = wy + TILE/2;
            if (!st.built) {
                const prog = st.buildClicks / 20;
                g.fillStyle(0x060e1a, 1); g.fillRect(wx+2, wy+2, TILE-4, TILE-4);
                g.fillStyle(0x111c33, 0.7); g.fillRect(wx+5, wy+5, TILE-10, TILE-10);
                g.lineStyle(3, 0x1a3355, 0.7); g.strokeCircle(cx, cy, 14);
                g.fillStyle(0x152040, 0.8); g.fillCircle(cx, cy, 11);
                g.fillStyle(0x445566, 0.7); g.fillCircle(cx, cy, 4);
                g.fillStyle(0x223344, 1); g.fillRect(wx+5, wy+TILE-6, TILE-10, 4);
                g.fillStyle(0x2255aa, 0.9); g.fillRect(wx+5, wy+TILE-6, Math.round((TILE-10)*prog), 4);
                g.lineStyle(1, 0x1a3355, 0.8); g.strokeRect(wx+2, wy+2, TILE-4, TILE-4);
            } else {
                const pulse = Math.sin(this.gameTime * 2.2 + st.c) * 0.3 + 0.7;
                g.fillStyle(0x0a1a33, 1); g.fillRect(wx+2, wy+2, TILE-4, TILE-4);
                g.fillStyle(0x112255, 1); g.fillRect(wx+5, wy+5, TILE-10, TILE-10);
                // glow
                g.fillStyle(0x2255cc, 0.12 * pulse); g.fillCircle(cx, cy, 20);
                // pipe ring
                g.lineStyle(3, 0x2266cc, 1); g.strokeCircle(cx, cy, 14);
                // inner tank
                g.fillStyle(0x224488, 1); g.fillCircle(cx, cy, 11);
                g.fillStyle(0x3377cc, 1); g.fillCircle(cx, cy, 8);
                g.fillStyle(0x88ddff, pulse); g.fillCircle(cx, cy, 4);
                // pipe stubs
                g.fillStyle(0x1a3366, 1);
                g.fillRect(wx+2, cy-2, 4, 4);
                g.fillRect(wx+TILE-6, cy-2, 4, 4);
                // Reserve bar (bottom of tile)
                const res = (st.oxygenReserve !== undefined ? st.oxygenReserve : 1200) / 1200;
                g.fillStyle(0x112233, 1); g.fillRect(wx+5, wy+TILE-6, TILE-10, 4);
                const barColor = res > 0.4 ? 0x2266cc : res > 0.15 ? 0xff9900 : 0xff2200;
                g.fillStyle(barColor, 0.9); g.fillRect(wx+5, wy+TILE-6, Math.round((TILE-10)*res), 4);
                g.lineStyle(2, 0x2266cc, 0.85); g.strokeRect(wx+2, wy+2, TILE-4, TILE-4);
            }
        }

        // Fuel stations
        for (const st of this.structures) {
            if (st.id !== 'fuel_station') continue;
            const wx = st.c * TILE, wy = OY + st.r * TILE;
            if (wx < camL - TILE || wx + TILE > camL + W + TILE) continue;
            const cx = wx + TILE/2, cy = wy + TILE/2;
            if (!st.built) {
                const prog = st.buildClicks / 20;
                g.fillStyle(0x150500, 1); g.fillRect(wx+2, wy+2, TILE-4, TILE-4);
                g.fillStyle(0x2a0d00, 0.7); g.fillRect(wx+5, wy+5, TILE-10, TILE-10);
                g.fillStyle(0x331100, 0.8); g.fillRect(cx-6, cy-10, 12, 20);
                g.fillStyle(0x221100, 1); g.fillRect(wx+5, wy+TILE-6, TILE-10, 4);
                g.fillStyle(0xff6600, 0.9); g.fillRect(wx+5, wy+TILE-6, Math.round((TILE-10)*prog), 4);
                g.lineStyle(1, 0x441100, 0.8); g.strokeRect(wx+2, wy+2, TILE-4, TILE-4);
            } else {
                const pulse = Math.sin(this.gameTime * 2.8 + st.c * 1.1) * 0.3 + 0.7;
                g.fillStyle(0x220800, 1); g.fillRect(wx+2, wy+2, TILE-4, TILE-4);
                g.fillStyle(0x441100, 1); g.fillRect(wx+5, wy+5, TILE-10, TILE-10);
                g.fillStyle(0xff4400, 0.10 * pulse); g.fillCircle(cx, cy, 20);
                // canister body
                g.fillStyle(0x882200, 1); g.fillRect(cx-8, cy-12, 16, 24);
                g.fillStyle(0xcc3300, 1); g.fillRect(cx-6, cy-10, 12, 20);
                // danger stripes
                g.fillStyle(0xffaa00, 1);
                g.fillRect(cx-6, cy-3, 12, 3); g.fillRect(cx-6, cy+3, 12, 3);
                // cap + nozzle
                g.fillStyle(0x661a00, 1); g.fillRect(cx-8, cy-12, 16, 4);
                g.fillStyle(0x555555, 1); g.fillRect(cx-2, cy-16, 4, 5);
                g.lineStyle(2, 0xff6622, 0.85); g.strokeRect(wx+2, wy+2, TILE-4, TILE-4);
            }
        }

        // Wreck of previous habitat
        if (this.wreckData) {
            const wwx = this.wreckData.x;
            const wwy = this.wreckData.y;
            if (wwx >= camL - 80 && wwx <= camL + W + 80) {
                // Tilt the wreck slightly from original angle
                const a  = this.wreckData.angle + 0.28;
                const cA = Math.cos(a), sA = Math.sin(a);
                const ox = wwx, oy = wwy;
                // Local→world helper (same as habitat uses internally)
                const wp = (lx, ly) => ({ x: ox + cA*lx - sA*ly, y: oy + sA*lx + cA*ly });

                // ── Dirt/dust burial shadow ──
                g.fillStyle(0x1a1508, 0.7); g.fillEllipse(ox, oy + 6, 58, 22);

                // ── Detached panel 1 — near, rotated away ──
                const pA = a + 0.6;
                const p1 = wp(-4, -38);
                g.fillStyle(0x141a2a, 0.95); g.fillRect(p1.x - 20, p1.y - 4, 38, 9);
                g.fillStyle(0x1a2236, 0.7);  g.fillRect(p1.x - 18, p1.y - 2, 33, 4);
                g.lineStyle(1, 0x0d1220, 0.7);
                [-12,-5,2,9].forEach(ox2 => {
                    g.beginPath(); g.moveTo(p1.x + ox2, p1.y - 4); g.lineTo(p1.x + ox2, p1.y + 5); g.strokePath();
                });
                // crack
                g.lineStyle(1, 0x080e18, 0.9);
                g.beginPath(); g.moveTo(p1.x - 6, p1.y - 4); g.lineTo(p1.x + 2, p1.y + 5); g.strokePath();

                // ── Detached panel 2 — further, flat on ground ──
                const p2 = wp(8, 38);
                g.fillStyle(0x111826, 0.9);  g.fillRect(p2.x - 18, p2.y - 4, 34, 8);
                g.fillStyle(0x16202e, 0.6);  g.fillRect(p2.x - 16, p2.y - 2, 30, 3);
                g.lineStyle(1, 0x0a1018, 0.6);
                [-10,-3,4,11].forEach(ox2 => {
                    g.beginPath(); g.moveTo(p2.x + ox2, p2.y - 4); g.lineTo(p2.x + ox2, p2.y + 4); g.strokePath();
                });
                // buried edge — dirt overlay
                g.fillStyle(0x1a1508, 0.55); g.fillRect(p2.x - 18, p2.y + 1, 34, 7);

                // ── Main chassis — same size as live habitat ──
                const ch = wp(0, 0);
                g.fillStyle(0x606068, 1); g.fillRect(ch.x - 22, ch.y - 15, 44, 30);
                g.fillStyle(0x50505a, 1); g.fillEllipse(ch.x + 18, ch.y, 14, 24); // nose
                // darkened dome
                g.fillStyle(0x484850, 1); g.fillRect(ch.x - 11, ch.y - 10, 22, 20);
                g.fillStyle(0x334455, 0.5); g.fillEllipse(ch.x, ch.y, 24, 24);
                // dents / cracks on chassis
                g.lineStyle(1, 0x303038, 0.9);
                g.beginPath(); g.moveTo(ch.x - 6, ch.y - 14); g.lineTo(ch.x + 5, ch.y - 4);  g.strokePath();
                g.beginPath(); g.moveTo(ch.x + 8, ch.y - 14); g.lineTo(ch.x + 2, ch.y + 8);  g.strokePath();
                g.beginPath(); g.moveTo(ch.x - 22, ch.y + 5); g.lineTo(ch.x - 10, ch.y - 2); g.strokePath();

                // ── Broken panel arm stubs (still attached) ──
                const t1 = wp(-6, -15); const t2 = wp(-6, 15);
                g.lineStyle(2, 0x555560, 1);
                g.beginPath(); g.moveTo(t1.x, t1.y); g.lineTo(t1.x - sA*6, t1.y + cA*6); g.strokePath();
                g.beginPath(); g.moveTo(t2.x, t2.y); g.lineTo(t2.x - sA*6, t2.y + cA*6); g.strokePath();

                // ── Wheels (half-buried) ──
                for (const [lx, ly] of [[-19,-13],[15,-13],[-19,9],[15,9]]) {
                    const p = wp(lx, ly);
                    g.fillStyle(0x222230, 1); g.fillRect(p.x - 3, p.y - 3, 6, 6);
                    g.fillStyle(0x1a1508, 0.6); g.fillRect(p.x - 3, p.y + 1, 6, 4); // dirt on lower half
                }

                // ── Bent antenna ──
                const an = wp(-18, -18);
                g.lineStyle(1, 0x555560, 0.8);
                g.beginPath(); g.moveTo(an.x, an.y); g.lineTo(an.x + cA*4 + sA*5, an.y + sA*4 - cA*5); g.strokePath();
                // dead light
                g.fillStyle(0x441111, 0.9); g.fillCircle(an.x, an.y, 2);

                // ── Dirt burial overlay (lower half sunk) ──
                g.fillStyle(0x1a1508, 0.45); g.fillRect(ch.x - 23, ch.y + 8, 48, 10);

                // ── Slow distress flicker ──
                const blink = Math.floor(this.gameTime * 0.7) % 5;
                if (blink === 0) {
                    g.fillStyle(0xff1100, 0.45); g.fillCircle(an.x, an.y, 4);
                }
            }
        }

        // In-flight meteors (all coords in world-space — camera handled by Phaser)
        for (const m of this.incomingMeteors) {
            const progress = 1 - (m.timer / m.dur); // 0→1
            const tx = m.c * TILE + TILE/2;
            const ty = OY + m.r * TILE + TILE/2;
            const mx = m.ox + (tx - m.ox) * progress;
            const my = m.oy + (ty - m.oy) * progress;

            // Warning shadow on target tile (grows as meteor approaches)
            const shadowR = 6 + progress * 26;
            g.fillStyle(0xff2200, progress * 0.45); g.fillCircle(tx, ty, shadowR);
            g.lineStyle(1, 0xff4400, progress * 0.8); g.strokeCircle(tx, ty, shadowR);

            // Pulsing crosshair on target
            if (progress > 0.15) {
                const cross = shadowR + 5;
                const pa = Math.sin(progress * Math.PI * 8) * 0.4 + 0.5;
                g.lineStyle(1, 0xff6600, pa);
                g.beginPath();
                g.moveTo(tx - cross, ty); g.lineTo(tx + cross, ty);
                g.moveTo(tx, ty - cross); g.lineTo(tx, ty + cross);
                g.strokePath();
            }

            // Meteor body
            const bodyR = 3 + progress * 3;
            g.fillStyle(0xffffff, 0.95); g.fillCircle(mx, my, bodyR);
            g.fillStyle(0xffaa44, 0.8);  g.fillCircle(mx, my, bodyR * 0.6);

            // Trail
            const TRAIL = 8;
            for (let i = 1; i <= TRAIL; i++) {
                const tp = Math.max(0, progress - i * 0.04);
                const trx = m.ox + (tx - m.ox) * tp;
                const try_ = m.oy + (ty - m.oy) * tp;
                const ta = (1 - i / TRAIL) * 0.7;
                const tr = bodyR * (1 - i / TRAIL) * 0.8;
                g.fillStyle(0xff6600, ta); g.fillCircle(trx, try_, Math.max(0.5, tr));
            }
        }

        // Meteorite impact flashes
        for (const f of this.meteorFlashes) {
            const wx = f.c * TILE + TILE/2;
            const wy = OY + f.r * TILE + TILE/2;
            const t  = f.life; // 1→0
            const radius = (1 - t) * 38 + 6;
            g.lineStyle(3 * t, 0xff6600, t); g.strokeCircle(wx, wy, radius);
            g.lineStyle(1.5 * t, 0xffcc44, t * 0.7); g.strokeCircle(wx, wy, radius * 0.6);
            if (t > 0.6) {
                g.fillStyle(0xffffff, (t - 0.6) * 2.5); g.fillCircle(wx, wy, 14 * t);
                g.fillStyle(0xff8800, (t - 0.6) * 1.5); g.fillCircle(wx, wy, 8 * t);
            }
        }

        // Dust clouds after meteorite impacts
        const DUST_R = 4 * TILE;
        for (const d of this.dustClouds) {
            const fade = d.life; // 1→0
            // Pulsing swirling rings
            for (let layer = 0; layer < 4; layer++) {
                const r = DUST_R * (0.4 + layer * 0.2) * (1 + (1 - fade) * 0.3);
                const a = fade * (0.22 - layer * 0.04);
                const grey = 0xaaaaaa - layer * 0x111111;
                g.fillStyle(grey, a);
                g.fillCircle(d.wx, d.wy, r);
            }
            // Dense inner core (fades first)
            if (fade > 0.3) {
                g.fillStyle(0xccbbaa, (fade - 0.3) * 0.35);
                g.fillCircle(d.wx, d.wy, DUST_R * 0.35);
            }
            // Soft outer edge
            g.lineStyle(1, 0x999988, fade * 0.25);
            g.strokeCircle(d.wx, d.wy, DUST_R);
        }
    }

    // ── Habitat drawing — local coords, transform handles rotation ──
    drawHabitat() {
        const g = this.habitatGfx; g.clear();
        g.setPosition(this.habX, this.habY);
        g.setRotation(this.habAngle);
        const inDark = (this.lastDarkness || 0) > 0.5;

        // shadow
        g.fillStyle(0x000000, 0.25); g.fillEllipse(3, 3, 52, 34);

        // chassis
        g.fillStyle(0xb0b0c0, 1); g.fillRect(-22, -15, 44, 30);
        // front nose (right = forward in local space)
        g.fillStyle(0xc0c0d0, 1); g.fillEllipse(18, 0, 14, 24);
        // dome
        g.fillStyle(0xd0d0e0, 1); g.fillRect(-11, -10, 22, 20);
        g.fillStyle(0x7799cc, 0.65); g.fillEllipse(0, 0, 24, 24);

        // solar panels (perpendicular to travel = top/bottom in local space)
        const pc = inDark ? 0x222233 : 0x1a3a99;
        const cc = inDark ? 0x303042 : 0x2255cc;

        g.lineStyle(2, 0x888898, 1); g.lineBetween(-6, -15, -6, -27);
        g.fillStyle(pc, 1); g.fillRect(-26, -34, 40, 11);
        g.lineStyle(1, cc, 0.65);
        [-20,-13,-6,1].forEach(ox => g.lineBetween(ox, -34, ox, -23));
        g.lineBetween(-26, -28, 14, -28);
        if (!inDark) { g.fillStyle(0x44ff44, 0.9); g.fillRect(10, -33, 3, 3); }

        g.lineStyle(2, 0x888898, 1); g.lineBetween(-6, 15, -6, 27);
        g.fillStyle(pc, 1); g.fillRect(-26, 23, 40, 11);
        g.lineStyle(1, cc, 0.65);
        [-20,-13,-6,1].forEach(ox => g.lineBetween(ox, 23, ox, 34));
        g.lineBetween(-26, 28, 14, 28);
        if (!inDark) { g.fillStyle(0x44ff44, 0.9); g.fillRect(10, 30, 3, 3); }

        // wheels
        [[-19,-13],[15,-13],[-19,9],[15,9]].forEach(([dx,dy]) => {
            g.fillStyle(0x333344, 1); g.fillRect(dx-3, dy-3, 6, 6);
            g.lineStyle(1, 0x555566, 1); g.strokeRect(dx-3, dy-3, 6, 6);
        });

        // antenna blink
        g.fillStyle(0xff4444, 1); g.fillCircle(-18, -18, 3);
        if (Math.floor(this.gameTime * 2) % 2 === 0) {
            g.fillStyle(0xff8888, 0.55); g.fillCircle(-18, -18, 6);
        }

        // headlight indicator (subtle — just the lamp unit)
        if (this.lightsOn) {
            g.fillStyle(0xffffcc, 0.95); g.fillEllipse(24, 0, 9, 12);
            g.fillStyle(0xffffff, 0.5);  g.fillEllipse(24, 0, 5, 7);
        } else {
            g.fillStyle(0x444433, 0.9);  g.fillEllipse(24, 0, 9, 12);
            g.fillStyle(0x222211, 0.6);  g.fillEllipse(24, 0, 5, 7);
        }

        // turbo exhaust flames (rear = left in local space)
        if (this.turboActive) {
            const flicker = Math.sin(this.gameTime * 40) * 0.25 + 0.75;
            const fl = Math.round(18 + flicker * 22);
            g.fillStyle(0xff5500, 0.85);
            g.fillTriangle(-22, -8, -22-fl, 0, -22, 8);
            g.fillStyle(0xffcc00, 0.9);
            g.fillTriangle(-22, -4, -22-Math.round(fl*0.65), 0, -22, 4);
            g.fillStyle(0xfff0aa, 0.95);
            g.fillTriangle(-22, -2, -22-Math.round(fl*0.35), 0, -22, 2);
            g.fillStyle(0xff8800, 0.18 * flicker);
            g.fillEllipse(-26, 0, 18, 22);
        }
    }

    // ── Lit terrain: smooth headlight cone above the night overlay ──
    drawLitTerrain() {
        const g = this.lightGfx;
        g.clear();
        if (!this.lightsOn) return;

        const darkness = 1 - (1 - Phaser.Math.Clamp(1 - (this.habX - this.nightWorldX) / 800, 0, 1));
        // Only draw when there's actual darkness to illuminate
        if (darkness < 0.04) return;

        const camL = this.cameras.main.scrollX;
        const cosA = Math.cos(this.habAngle);
        const sinA = Math.sin(this.habAngle);

        // Origin: front of vehicle in screen coords
        const ox = this.habX + cosA * 22 - camL;
        const oy = this.habY + sinA * 22;

        // Beam tip points (screen coords) at different distances
        const reach = 260;
        const spread = 52; // half-width at full reach

        // Compute the 3 beam tip points
        const perpX = -sinA, perpY = cosA;
        const tipX  = ox + cosA * reach;
        const tipY  = oy + sinA * reach;
        const leftX  = tipX + perpX * spread;
        const leftY  = tipY + perpY * spread;
        const rightX = tipX - perpX * spread;
        const rightY = tipY - perpY * spread;

        // ── Outer glow (wide, very soft) ──
        g.fillStyle(0xfff4cc, darkness * 0.10);
        g.fillTriangle(ox, oy, leftX + perpX * 30, leftY + perpY * 30, rightX - perpX * 30, rightY - perpY * 30);

        // ── Mid cone ──
        g.fillStyle(0xfff0bb, darkness * 0.18);
        g.fillTriangle(ox, oy, leftX, leftY, rightX, rightY);

        // ── Inner bright core (narrow) ──
        const innerSpread = spread * 0.38;
        g.fillStyle(0xfffde8, darkness * 0.30);
        g.fillTriangle(
            ox, oy,
            tipX + perpX * innerSpread, tipY + perpY * innerSpread,
            tipX - perpX * innerSpread, tipY - perpY * innerSpread
        );

        // ── Central hotspot near lamp ──
        g.fillStyle(0xffffff, darkness * 0.22);
        g.fillEllipse(ox + cosA * 30, oy + sinA * 30, 38, 26);

        // ── Lamp source glow ──
        g.fillStyle(0xffffee, darkness * 0.35);
        g.fillCircle(ox, oy, 10);
    }

    // ── Input ─────────────────────────────────────────────────
    onPointerMove(pointer) {
        const wx = pointer.x + this.cameras.main.scrollX;
        const c  = Math.floor(wx / TILE);
        const r  = Math.floor((pointer.y - OY) / TILE);
        const hC = Math.floor(this.habX / TILE);
        const hR = Math.floor((this.habY - OY) / TILE);
        if ((c === hC && r === hR) || c < 0 || c >= COLS || r < 0 || r >= ROWS) { this.previewTile = null; return; }
        // Build mode: show placement preview
        if (this.buildMode) {
            const canPlace = this.grid[c][r] === T_ROAD &&
                             !this.structures.some(s => s.c === c && s.r === r);
            this.previewTile = { c, r, demolish: false, buildMode: true, canPlace };
            return;
        }
        // Wreck tile detection
        if (this.wreckData) {
            const wC = Math.floor(this.wreckData.x / TILE);
            const wR = Math.floor((this.wreckData.y - OY) / TILE);
            if (c === wC && r === wR) { this.previewTile = { c, r, demolish: true, wreck: true }; return; }
        }
        const t = this.grid[c][r];
        if (t === T_ROAD) { this.previewTile = null; return; }
        const demolish = (t === T_CRATER || t === T_BOULDER);
        this.previewTile = { c, r, demolish };
    }

    onPointerDown(pointer) {
        // Build menu item click (screen-space, before world coords)
        if (this.buildMenuOpen) {
            const bx = W/2 - 220, by = H/2 - 95;
            for (let i = 0; i < this.BUILD_ITEMS.length; i++) {
                const iy = by + 43 + i * 80;
                if (pointer.x >= bx+10 && pointer.x <= bx+430 &&
                    pointer.y >= iy    && pointer.y <= iy + 70) {
                    this._selectBuildItem(i);
                }
            }
            return;
        }

        const wx = pointer.x + this.cameras.main.scrollX;
        const c  = Math.floor(wx / TILE);
        const r  = Math.floor((pointer.y - OY) / TILE);
        const hC = Math.floor(this.habX / TILE);
        const hR = Math.floor((this.habY - OY) / TILE);
        if ((c === hC && r === hR) || c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
        const t  = this.grid[c][r];
        const sx = c * TILE + TILE/2 - this.cameras.main.scrollX;
        const sy = OY + r * TILE + TILE/2;

        // Build mode placement
        if (this.buildMode) {
            if (this.grid[c][r] !== T_ROAD) {
                this.popup(sx, sy, '⛔ TYLKO NA DRODZE', '#ff4400');
                return;
            }
            if (this.structures.some(s => s.c === c && s.r === r)) {
                this.popup(sx, sy, '⛔ ZAJĘTE', '#ff4400');
                return;
            }
            const item = this.BUILD_ITEMS.find(i => i.id === this.buildMode.id);
            this.glassCollected   -= item.cost.glass   || 0;
            this.plasticCollected -= item.cost.plastic || 0;
            this.scrapCollected   -= item.cost.scrap   || 0;
            this.structures.push({ id: this.buildMode.id, c, r, built: false, buildClicks: 0 });
            this.buildMode = null;
            this.buildModeTxt.setVisible(false);
            this.redrawPickups();
            this.popup(sx, sy, '🔨 BUDOWA — kliknij 20× żeby ukończyć', '#ffcc44');
            return;
        }

        // Structure build progress (click 20× to complete)
        const underConstruction = this.structures &&
            this.structures.find(s => s.c === c && s.r === r && !s.built);
        if (underConstruction) {
            underConstruction.buildClicks++;
            if (underConstruction.buildClicks >= 20) {
                underConstruction.built = true;
                if (underConstruction.id === 'oxygen_station') underConstruction.oxygenReserve = 1200;
                this.redrawPickups();
                this.popup(sx, sy, '✅ STACJA AKTYWNA!', '#44ff88');
            } else {
                this.popup(sx, sy, `🔨 ${underConstruction.buildClicks}/20`, '#ffcc44');
                this.redrawPickups();
            }
            return;
        }

        // Wreck clearing
        if (this.wreckData) {
            const wC = Math.floor(this.wreckData.x / TILE);
            const wR = Math.floor((this.wreckData.y - OY) / TILE);
            if (c === wC && r === wR) {
                this.demolishCounts['wreck'] = (this.demolishCounts['wreck'] || 0) + 1;
                const cnt = this.demolishCounts['wreck'];
                if (cnt >= 15) {
                    this.wreckData = null;
                    delete this.demolishCounts['wreck'];
                    this.redrawPickups();
                    this.popup(sx, sy, 'WRAK UPRZĄTNIĘTY', '#ffcc44');
                } else {
                    this.popup(sx, sy, `${cnt}/15`, '#ff8833');
                }
                return;
            }
        }

        if (t === T_CRATER || t === T_BOULDER) {
            const key = `${c}_${r}`;
            this.demolishCounts[key] = (this.demolishCounts[key] || 0) + 1;
            const cnt = this.demolishCounts[key];
            if (cnt >= 15) {
                this.grid[c][r] = T_EMPTY;
                delete this.demolishCounts[key];
                this.popup(sx, sy, 'USUNIĘTO!', '#ffaa44');
            } else {
                this.popup(sx, sy, `${cnt}/15`, '#ff8833');
            }
            return;
        }

        if (t !== T_EMPTY) return;
        this.grid[c][r] = T_ROAD;
        this.roadBuilt++;
        this.popup(sx, sy, '+DROGA', '#88ff44');
    }

    popup(sx, sy, label, color) {
        const txt = this.add.text(sx, sy, label, {
            fontSize: '14px', fontFamily: 'monospace', color,
            stroke: '#001100', strokeThickness: 2
        }).setScrollFactor(0).setDepth(30).setOrigin(0.5);
        this.tweens.add({ targets: txt, y: sy-40, alpha: 0, duration: 900, ease: 'Power2', onComplete: () => txt.destroy() });
    }

    setPauseVisible(visible) {
        this.pauseGfx.setVisible(visible);
        this.pauseTitleTxt.setVisible(visible);
        this.pauseResumeTxt.setVisible(visible);
        this.pauseNewTxt.setVisible(visible);
        this.pauseMenuTxt.setVisible(visible);
        this.pauseHintTxt.setVisible(visible);
        if (visible) {
            this.pauseGfx.clear();
            this.pauseGfx.fillStyle(0x000010, 0.82); this.pauseGfx.fillRect(0, 0, W, H);
            this.pauseGfx.lineStyle(1, 0x334488, 0.8);
            this.pauseGfx.strokeRect(W/2 - 240, 180, 480, 300);
            this.pauseGfx.fillStyle(0x000820, 0.95); this.pauseGfx.fillRect(W/2 - 240, 180, 480, 300);
        }
    }

    _selectBuildItem(i) {
        const item = this.BUILD_ITEMS[i];
        if (!item) return;
        const canAfford = this.glassCollected   >= (item.cost.glass   || 0) &&
                          this.plasticCollected >= (item.cost.plastic || 0) &&
                          this.scrapCollected   >= (item.cost.scrap   || 0);
        if (canAfford) {
            this.buildMode = { id: item.id };
            this.buildMenuOpen = false;
            this.setBuildMenuVisible(false);
            this.buildModeTxt.setText(`📍 Tryb budowania: ${item.name} — kliknij kratkę DROGI  [SPACJA=anuluj]`);
            this.buildModeTxt.setVisible(true);
        } else {
            const sx = this.habX - this.cameras.main.scrollX;
            this.popup(sx, this.habY - 52, `⚠ Potrzebujesz 💎${item.cost.glass||0} 🧩${item.cost.plastic||0} ⚙${item.cost.scrap||0}`, '#ff4400');
        }
    }

    setBuildMenuVisible(visible) {
        this.buildGfx.setVisible(visible);
        this.buildMenuTitleTxt.setVisible(visible);
        this.buildItemTxts.forEach(t => t.setVisible(visible));
        if (visible) {
            this.buildGfx.clear();
            const g = this.buildGfx;
            const bx = W/2 - 220, by = H/2 - 95;
            const bh = 50 + this.BUILD_ITEMS.length * 80;
            // Panel background
            g.fillStyle(0x050520, 0.92); g.fillRect(bx, by, 440, bh);
            g.lineStyle(2, 0x4444aa, 1);  g.strokeRect(bx, by, 440, bh);
            g.lineStyle(1, 0x222255, 0.8); g.strokeRect(bx+2, by+2, 436, bh-4);
            // Separator after title
            g.lineStyle(1, 0x4444aa, 0.6); g.lineBetween(bx+10, by+38, bx+430, by+38);

            // Per-item: graphic preview + clickable area highlight
            this.BUILD_ITEMS.forEach((item, i) => {
                const iy = by + 43 + i * 80;
                // Clickable row border
                g.lineStyle(1, 0x333388, 0.9); g.strokeRect(bx+10, iy, 420, 70);
                g.fillStyle(0x0a0a30, 0.5);    g.fillRect(bx+10, iy, 420, 70);

                // Station graphic preview at left of row (48×48)
                if (item.id === 'charging_station') {
                    const px = bx + 20, py = iy + 11, pw = TILE;
                    g.fillStyle(0x333344, 1); g.fillRect(px+2, py+2, pw-4, pw-4);
                    g.fillStyle(0x555566, 1); g.fillRect(px+5, py+5, pw-10, pw-10);
                    g.fillStyle(0xffcc00, 1);
                    g.fillRect(px+5,    py+5,    pw-10, 3);
                    g.fillRect(px+5,    py+pw-8, pw-10, 3);
                    g.fillRect(px+5,    py+5,    3, pw-10);
                    g.fillRect(px+pw-8, py+5,    3, pw-10);
                    const lcx = px + pw/2, lcy = py + pw/2;
                    g.fillStyle(0xffff44, 1);
                    g.fillTriangle(lcx+4, lcy-11, lcx-5, lcy+1, lcx+2, lcy+1);
                    g.fillTriangle(lcx-4, lcy+11, lcx+5, lcy-1, lcx-2, lcy-1);
                    g.lineStyle(2, 0xaaaa33, 0.85); g.strokeRect(px+2, py+2, pw-4, pw-4);
                }
                if (item.id === 'oxygen_station') {
                    const px = bx + 20, py = iy + 11, pw = TILE;
                    const ocx = px + pw/2, ocy = py + pw/2;
                    g.fillStyle(0x0a1a33, 1); g.fillRect(px+2, py+2, pw-4, pw-4);
                    g.fillStyle(0x112255, 1); g.fillRect(px+5, py+5, pw-10, pw-10);
                    g.lineStyle(3, 0x2255aa, 1); g.strokeCircle(ocx, ocy, 14);
                    g.fillStyle(0x224488, 1); g.fillCircle(ocx, ocy, 11);
                    g.fillStyle(0x3366bb, 1); g.fillCircle(ocx, ocy, 8);
                    g.fillStyle(0x88ddff, 1); g.fillCircle(ocx-3, ocy, 3);
                    g.fillStyle(0x88ddff, 1); g.fillCircle(ocx+4, ocy-3, 2);
                    g.fillStyle(0x1a3366, 1);
                    g.fillRect(px+2, ocy-2, 4, 4); g.fillRect(px+pw-6, ocy-2, 4, 4);
                    g.lineStyle(2, 0x2255aa, 0.85); g.strokeRect(px+2, py+2, pw-4, pw-4);
                }
                if (item.id === 'fuel_station') {
                    const px = bx + 20, py = iy + 11, pw = TILE;
                    const fcx = px + pw/2, fcy = py + pw/2;
                    g.fillStyle(0x220800, 1); g.fillRect(px+2, py+2, pw-4, pw-4);
                    g.fillStyle(0x441100, 1); g.fillRect(px+5, py+5, pw-10, pw-10);
                    // canister body
                    g.fillStyle(0x882200, 1); g.fillRect(fcx-8, fcy-12, 16, 24);
                    g.fillStyle(0xcc3300, 1); g.fillRect(fcx-6, fcy-10, 12, 20);
                    // danger stripes
                    g.fillStyle(0xffaa00, 1);
                    g.fillRect(fcx-6, fcy-3, 12, 3); g.fillRect(fcx-6, fcy+3, 12, 3);
                    // cap + nozzle
                    g.fillStyle(0x661a00, 1); g.fillRect(fcx-8, fcy-12, 16, 4);
                    g.fillStyle(0x555555, 1); g.fillRect(fcx-2, fcy-16, 4, 5);
                    g.lineStyle(2, 0xff6622, 0.85); g.strokeRect(px+2, py+2, pw-4, pw-4);
                }
            });
        }
    }

    flashHint(msg, color) {
        this.hintTxt.setText(msg).setColor(color);
        this.time.delayedCall(2500, () => {
            this.hintTxt.setText('W=do przodu  S=hamulec  A=góra  D=dół  SHIFT=turbo  F=światła  B=bateria→moc').setColor('#4444aa');
        });
    }

    // ── Update ────────────────────────────────────────────────
    update(time, delta) {
        const dt = Math.min(delta / 1000, 0.05);

        // ESC: cancel build mode first, then pause
        if (Phaser.Input.Keyboard.JustDown(this.escKey)) {
            if (this.buildMode || this.buildMenuOpen) {
                this.buildMode = null;
                this.buildMenuOpen = false;
                this.setBuildMenuVisible(false);
                this.buildModeTxt.setVisible(false);
            } else {
                this.gamePaused = !this.gamePaused;
                this.setPauseVisible(this.gamePaused);
            }
        }

        if (this.gamePaused) {
            const KC = Phaser.Input.Keyboard.KeyCodes;
            if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(KC.ENTER))) {
                this.gamePaused = false; this.setPauseVisible(false);
            }
            if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(KC.N))) {
                this.scene.start('Game');
            }
            if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(KC.M))) {
                this.scene.start('Menu');
            }
            return;
        }

        this.gameTime += dt;

        this.nightSpeed  = 26 + Math.floor(this.gameTime / 55) * 5;
        this.nightWorldX += this.nightSpeed * dt;

        // ── Build menu (SPACE) ─────────────────────────────────
        if (Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
            if (this.buildMode) {
                this.buildMode = null;
                this.buildModeTxt.setVisible(false);
            } else {
                this.buildMenuOpen = !this.buildMenuOpen;
                this.setBuildMenuVisible(this.buildMenuOpen);
            }
        }
        if (this.buildMenuOpen) {
            const menuKeys = [this.oneKey, this.twoKey, this.threeKey];
            for (let i = 0; i < this.BUILD_ITEMS.length; i++) {
                if (menuKeys[i] && Phaser.Input.Keyboard.JustDown(menuKeys[i])) {
                    this._selectBuildItem(i);
                }
            }
            return;
        }

        this.turboActive = this.turboKey.isDown && this.fuel > 0;
        if (Phaser.Input.Keyboard.JustDown(this.fKey)) this.lightsOn = !this.lightsOn;
        if (this.power <= 0 && this.lightsOn) {
            this.lightsOn = false;
            const sx = this.habX - this.cameras.main.scrollX;
            this.popup(sx, this.habY - 52, '💡 ŚWIATŁA ZGASŁY', '#888844');
        }
        if (Phaser.Input.Keyboard.JustDown(this.bKey) && this.batteriesCollected > 0) {
            this.batteriesCollected--;
            this.power = Math.min(100, this.power + 25);
            this.popup(W / 2, H / 2 - 40, '+25% MOC [bateria]', '#aaff00');
        }
        if (Phaser.Input.Keyboard.JustDown(this.rKey) && this.repairKitsCollected > 0) {
            this.repairKitsCollected--;
            const activeFailures = [];
            if (this.o2Failure)    activeFailures.push('o2');
            if (this.driveFailure) activeFailures.push('drive');
            if (this.solarFailure) activeFailures.push('solar');
            if (activeFailures.length > 0) {
                const fix = activeFailures[Math.floor(Math.random() * activeFailures.length)];
                if (fix === 'o2') {
                    this.o2Failure = false; this.o2FailTimer = 0;
                    this.popup(W / 2, H / 2 - 40, '🔧 SYSTEM O₂ NAPRAWIONY', '#44ffcc');
                } else if (fix === 'drive') {
                    this.driveFailure = false; this.driveFailTimer = 0;
                    this.popup(W / 2, H / 2 - 40, '🔧 NAPĘD NAPRAWIONY', '#44ffcc');
                } else {
                    this.solarFailure = false; this.solarFailTimer = 0;
                    this.popup(W / 2, H / 2 - 40, '🔧 PANELE SŁONECZNE NAPRAWIONE', '#44ffcc');
                }
            } else {
                this.hull = Math.min(100, this.hull + 25);
                this.popup(W / 2, H / 2 - 40, '+25% KADŁUB [klucz]', '#44ffcc');
            }
        }

        this.moveHabitat(dt);
        this.cameras.main.scrollX += (this.habX - W/3 - this.cameras.main.scrollX) * 0.1;

        this.checkPickups();
        this.checkRepairKits();
        this.checkFuelCanisters();
        this.checkScrap();
        this.checkGlass();
        this.checkPlastic();
        this.updateTrail(dt);

        // lightFraction: cyclic day/night — NIGHT_BAND = DAY_BAND = 3120 px (~2 min each)
        const _NB = 3120, _CYCLE = 6240, _GRAD = 800;
        let darkness = 0;
        for (let _k = 0; _k <= 4; _k++) {
            const _nR = this.nightWorldX - _k * _CYCLE;
            const _nL = _nR - _NB;
            let _d = 0;
            if (this.habX >= _nR) {
                const _g = this.habX - _nR;
                if (_g < _GRAD) { const _t = 1 - _g / _GRAD; _d = _t*_t*_t*(_t*(6*_t-15)+10); }
            } else if (this.habX >= _nL) {
                const _g = this.habX - _nL;
                if (_g < _GRAD) { const _t = _g / _GRAD; _d = _t*_t*_t*(_t*(6*_t-15)+10); }
                else _d = 1;
            }
            darkness = Math.max(darkness, _d);
            if (_nR < this.habX - _NB - _GRAD) break;
        }
        this.lastDarkness = darkness;
        const lightFraction = 1 - darkness;

        const inDark = darkness > 0.5;
        const drain  = (1 - lightFraction) * 7.5 * (this.lightsOn ? 2 : 1);
        const DUST_R = 4 * TILE;
        let dustIntensity = 0;
        for (const d of this.dustClouds) {
            const dx = this.habX - d.wx, dy = this.habY - d.wy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < DUST_R) {
                const proximity = 1 - dist / DUST_R;
                dustIntensity = Math.min(1, dustIntensity + proximity * d.life);
            }
        }
        const dustMod = dustIntensity > 0 ? Math.max(0, 1 - dustIntensity * 2.2) : 1;
        this.dustMod = dustMod;
        if (dustIntensity > 0) {
            this.hull = Phaser.Math.Clamp(this.hull - dustIntensity * 1.2 * dt, 0, 100);
        }
        const regen  = this.solarFailure ? 0 : lightFraction * 6 * dustMod;

        this.dustIntensity = dustIntensity;
        this.power   = Phaser.Math.Clamp(this.power + (regen - drain) * dt, 0, 100);

        // Structure effects
        if (this.structures && this.structures.length > 0) {
            const hC = Math.floor(this.habX / TILE);
            const hR = Math.floor((this.habY - OY) / TILE);

            // Passive: station reserves recharge in sunlight regardless of habitat position
            for (const st of this.structures) {
                if (!st.built) continue;
                if (st.id === 'oxygen_station') {
                    if (st.oxygenReserve === undefined) st.oxygenReserve = 1200;
                    if (lightFraction > 0.3)
                        st.oxygenReserve = Math.min(1200, st.oxygenReserve + 10 * dt);
                }
                if (st.id === 'charging_station') {
                    if (st.powerReserve === undefined) st.powerReserve = 1200;
                    if (lightFraction > 0.3)
                        st.powerReserve = Math.min(1200, st.powerReserve + 10 * dt);
                }
            }

            for (const st of this.structures) {
                if (!st.built || st.c !== hC || st.r !== hR) continue;
                if (st.id === 'charging_station') {
                    if (st.powerReserve === undefined) st.powerReserve = 1200;
                    if (lightFraction > 0.3) {
                        // Day: direct solar supply to habitat
                        this.power = Math.min(100, this.power + 20 * dt);
                    } else {
                        // Night: draw from reserve
                        if (st.powerReserve > 0) {
                            const draw = Math.min(20 * dt, st.powerReserve);
                            this.power = Math.min(100, this.power + draw);
                            st.powerReserve -= draw;
                        }
                    }
                }
                if (st.id === 'oxygen_station') {
                    if (st.oxygenReserve === undefined) st.oxygenReserve = 1200;
                    if (lightFraction > 0.3) {
                        // Day: direct solar supply to habitat
                        this.oxygen = Math.min(100, this.oxygen + 25 * dt);
                    } else {
                        // Night: draw from reserve tank
                        if (st.oxygenReserve > 0) {
                            const draw = Math.min(25 * dt, st.oxygenReserve);
                            this.oxygen = Math.min(100, this.oxygen + draw);
                            st.oxygenReserve -= draw;
                        }
                    }
                }
                if (st.id === 'fuel_station') {
                    this.fuel = Math.min(100, this.fuel + 20 * dt);
                }
            }
        }

        // Fuel: burned by turbo only, no passive regen
        if (this.turboActive) {
            this.fuel = Phaser.Math.Clamp(this.fuel - 18 * dt, 0, 100);
        }

        this.redrawTerrain();
        this.drawHabitat();
        this.redrawPickups();
        this.updatePreview();
        this.updateNightOverlay();
        this.drawLitTerrain();
        this.updateUI(inDark);

        // Random O₂ failure events
        this.o2FailCooldown -= dt;
        if (!this.o2Failure && this.o2FailCooldown <= 0) {
            this.o2Failure      = true;
            this.o2FailTimer    = 8 + Math.random() * 14;    // failure lasts 8-22 s
            this.o2FailCooldown = 30 + Math.random() * 50;   // next failure in 30-80 s
            const sx = this.habX - this.cameras.main.scrollX;
            this.popup(sx, this.habY - 52, '⚠ AWARIA SYSTEMU O₂', '#ff2200');
        }
        if (this.o2Failure) {
            this.o2FailTimer -= dt;
            if (this.o2FailTimer <= 0) {
                this.o2Failure = false;
                const sx = this.habX - this.cameras.main.scrollX;
                this.popup(sx, this.habY - 52, 'O₂ SYSTEM PRZYWRÓCONY', '#44ff88');
            }
        }

        // Random drive failure events
        this.driveFailCooldown -= dt;
        if (!this.driveFailure && this.driveFailCooldown <= 0) {
            this.driveFailure      = true;
            this.driveFailTimer    = 6 + Math.random() * 12;   // 6-18 s
            this.driveFailCooldown = 40 + Math.random() * 60;  // next in 40-100 s
            const sx = this.habX - this.cameras.main.scrollX;
            this.popup(sx, this.habY - 68, '⚙ AWARIA NAPĘDU!', '#ffcc00');
        }
        if (this.driveFailure) {
            this.driveFailTimer -= dt;
            if (this.driveFailTimer <= 0) {
                this.driveFailure = false;
                const sx = this.habX - this.cameras.main.scrollX;
                this.popup(sx, this.habY - 68, 'NAPĘD PRZYWRÓCONY', '#88ffcc');
            }
        }

        // Random solar panel failure
        this.solarFailCooldown -= dt;
        if (!this.solarFailure && this.solarFailCooldown <= 0) {
            this.solarFailure      = true;
            this.solarFailTimer    = 10 + Math.random() * 15;   // lasts 10-25 s
            this.solarFailCooldown = 45 + Math.random() * 55;   // next in 45-100 s
            const sx = this.habX - this.cameras.main.scrollX;
            this.popup(sx, this.habY - 84, '☀ AWARIA PANELI SŁONECZNYCH!', '#ffcc00');
        }
        if (this.solarFailure) {
            this.solarFailTimer -= dt;
            if (this.solarFailTimer <= 0) {
                this.solarFailure = false;
                const sx = this.habX - this.cameras.main.scrollX;
                this.popup(sx, this.habY - 84, 'PANELE SŁONECZNE PRZYWRÓCONE', '#aaff44');
            }
        }

        // Micrometeorite impacts
        this.meteorCooldown -= dt;
        if (this.meteorCooldown <= 0) {
            this.meteorCooldown = 5 + Math.random() * 8;
            const camL = this.cameras.main.scrollX;
            const cMin = Math.max(6, Math.floor(camL / TILE));
            const cMax = Math.min(COLS - 1, Math.floor((camL + W) / TILE));
            const c = cMin + Math.floor(Math.random() * (cMax - cMin + 1));
            const r = Math.floor(Math.random() * ROWS);
            // Origin: random edge of screen (in screen-space, stored as world offsets)
            const angle = Math.random() * Math.PI * 2;
            const dist  = 520 + Math.random() * 200;
            const tx = c * TILE + TILE/2;
            const ty = OY + r * TILE + TILE/2;
            const dur = 1.8 + Math.random() * 0.6;
            this.incomingMeteors.push({
                c, r,
                timer: dur, dur,
                ox: tx + Math.cos(angle) * dist, // world-space origin
